name: Docker Image Build & Push

on:
  push:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # v4 ist aktuell

      - name: Log in to the Container registry
        uses: docker/login-action@v3 # v3 ist aktuell
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5 # v5 ist aktuell
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dienstbuch:dev
