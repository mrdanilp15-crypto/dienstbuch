<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeuerwehrHub - Login</title>
    <meta name="theme-color" content="#b71c1c">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            font-family: 'Segoe UI', system-ui, sans-serif; margin: 0;
        }
        .login-card { 
            width: 100%; max-width: 400px; padding: 2.5rem; background: rgba(255, 255, 255, 0.98);
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .fire-icon-container {
            width: 75px; height: 75px; background: #b71c1c; color: white; border-radius: 18px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;
            box-shadow: 0 8px 20px rgba(183, 28, 28, 0.3); font-size: 2rem;
        }
        .form-control { border-radius: 10px; padding: 0.75rem 1rem; border: 1px solid #cbd5e1; background: #f8fafc; }
        .form-control:focus { border-color: #b71c1c; box-shadow: 0 0 0 0.25rem rgba(183, 28, 28, 0.15); background: white; }
        .btn-submit { background-color: #b71c1c; border: none; border-radius: 10px; padding: 0.75rem; font-weight: 700; color: white; transition: all 0.2s; }
        .btn-submit:hover:not(:disabled) { background-color: #9a1616; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(183, 28, 28, 0.2); }
    </style>
</head>
<body>

    <div class="login-card text-center shadow-lg">
        <div class="fire-icon-container"><i class="fa fa-fire"></i></div>
        <h3 class="fw-black mb-1 text-dark tracking-tight">FEUERWEHR<span class="text-danger">HUB</span></h3>
        <p class="text-muted small mb-4">Meldestufe — Digitales Dienstbuch</p>
        <div id="errorBox" class="alert alert-danger py-2 small mb-3 text-start border-0 rounded-3" style="display:none;"></div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold text-secondary">Benutzername</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0 rounded-start-3"><i class="fa fa-user"></i></span>
                    <input type="text" id="usernameInput" class="form-control border-start-0 rounded-end-3" placeholder="z. B. admin" required autocomplete="username">
                </div>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-secondary">Passwort</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0 rounded-start-3"><i class="fa fa-lock"></i></span>
                    <input type="password" id="passwordInput" class="form-control border-start-0 rounded-end-3" placeholder="********" required autocomplete="current-password">
                </div>
            </div>
            
            <button type="submit" id="submitBtn" class="btn btn-submit w-100 d-flex align-items-center justify-content-center gap-2 shadow-sm">
                <span id="btnText"><i class="fa fa-sign-in-alt me-1"></i> Cockpit öffnen</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm" style="display: none;" role="status"></span>
            </button>
        </form>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('usernameInput'), passwordInput = document.getElementById('passwordInput');
            const errorBox = document.getElementById('errorBox'), btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText'), spinner = document.getElementById('btnSpinner');

            errorBox.style.display = 'none'; btn.disabled = true; btnText.style.display = 'none'; spinner.style.display = 'inline-block';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput.value.trim(), password: passwordInput.value })
                });
                const data = await response.json();

                if (!response.ok) {
                    errorBox.innerHTML = `<i class="fa fa-exclamation-circle me-1"></i> ${data.detail || 'Fehler beim Abgleich!'}`;
                    errorBox.style.display = 'block'; passwordInput.value = ''; btn.disabled = false; btnText.style.display = 'inline-block'; spinner.style.display = 'none'; passwordInput.focus(); return;
                }
                localStorage.setItem('isLoggedIn', 'true'); localStorage.setItem('userRole', data.role);
                window.location.href = data.redirect;
            } catch (error) {
                errorBox.innerHTML = `<i class="fa fa-exclamation-circle me-1"></i> Host-Verbindung fehlgeschlagen!`; errorBox.style.display = 'block';
                btn.disabled = false; btnText.style.display = 'inline-block'; spinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
