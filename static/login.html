<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - FeuerwehrHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .login-card { width: 100%; max-width: 400px; padding: 2.5rem; background: #ffffff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #cbd5e1; }
        .fire-icon-container { width: 70px; height: 70px; background: #dc2626; color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto; font-size: 2rem; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2); }
        .form-control { border-radius: 6px; padding: 0.75rem 1rem; border: 1px solid #cbd5e1; font-weight: 600; }
        .btn-submit { background-color: #dc2626; border: none; border-radius: 6px; padding: 0.75rem; font-weight: 700; color: white; width: 100%; transition: 0.2s; }
        .btn-submit:hover { background-color: #b91c1c; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="fire-icon-container"><i class="fa fa-fire"></i></div>
        <h3 class="fw-bold mb-1 text-dark">Feuerwehr<span class="text-danger">Hub</span></h3>
        <p class="text-muted small mb-4">Digitale Leitstelle & Dienstbuch</p>
        <div id="errorBox" class="alert alert-danger py-2 small mb-3 text-start" style="display:none; font-weight:600;"></div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold text-secondary">Benutzerkennung</label>
                <input type="text" id="usernameInput" class="form-control" placeholder="admin" required autocomplete="username">
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-secondary">Passwort</label>
                <input type="password" id="passwordInput" class="form-control" placeholder="********" required autocomplete="current-password">
            </div>
            <button type="submit" id="submitBtn" class="btn btn-submit">Verbindung herstellen</button>
        </form>
    </div>
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const errorBox = document.getElementById('errorBox');
            errorBox.style.display = 'none';
            try {
                const response = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: document.getElementById('usernameInput').value, password: document.getElementById('passwordInput').value })
                });
                const data = await response.json();
                if (!response.ok) { errorBox.innerText = data.detail || 'Fehler!'; errorBox.style.display = 'block'; return; }
                window.location.href = data.redirect;
            } catch (error) { errorBox.innerText = "Server-Verbindungsfehler!"; errorBox.style.display = 'block'; }
        }
    </script>
</body>
</html>
