<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - FeuerwehrHub</title>
    <meta name="theme-color" content="#b71c1c">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #0b0f19 0%, #111827 100%); 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            font-family: 'Segoe UI', system-ui, sans-serif; margin: 0;
        }
        .login-card { 
            width: 100%; max-width: 400px; padding: 2.5rem; background: #1e293b;
            border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); margin: 15px; border: 1px solid #334155;
        }
        .fire-icon-container {
            width: 75px; height: 75px; background: #ef4444; color: white; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); font-size: 2rem;
        }
        .form-control { border-radius: 8px; padding: 0.75rem 1rem; border: 1px solid #334155; background: #111827; color: #fff; }
        .form-control:focus { border-color: #ef4444; box-shadow: 0 0 0 0.25rem rgba(239, 68, 68, 0.2); background: #111827; color: #fff; }
        .btn-submit { background-color: #ef4444; border: none; border-radius: 8px; padding: 0.75rem; font-weight: 700; color: white; transition: 0.2s; }
        .btn-submit:hover:not(:disabled) { background-color: #dc2626; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="login-card text-center shadow-lg">
        <div class="fire-icon-container"><i class="fa fa-fire"></i></div>
        <h3 class="fw-bold mb-1 text-white tracking-tight">FEUERWEHR<span style="color:#ef4444">HUB</span></h3>
        <p class="text-muted small mb-4">Digitales Dienstbuch — Leitstelle</p>
        <div id="errorBox" class="alert alert-danger py-2 small mb-3 text-start border-0 bg-danger text-white rounded-3" style="display:none; background-color: #dc2626 !important;"></div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold text-muted">Benutzername</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark text-muted border-secondary rounded-start"><i class="fa fa-user"></i></span>
                    <input type="text" id="usernameInput" class="form-control border-start-0 rounded-end" placeholder="Kürzel..." required autocomplete="username">
                </div>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-muted">Passwort</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark text-muted border-secondary rounded-start"><i class="fa fa-lock"></i></span>
                    <input type="password" id="passwordInput" class="form-control border-start-0 rounded-end" placeholder="********" required autocomplete="current-password">
                </div>
            </div>
            
            <button type="submit" id="submitBtn" class="btn btn-submit w-100 d-flex align-items-center justify-content-center gap-2 shadow-sm">
                <span id="btnText"><i class="fa fa-sign-in-alt me-1"></i> Cockpit öffnen</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm" style="display: none;" role="status"></span>
            </button>
        </form>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('usernameInput'), passwordInput = document.getElementById('passwordInput');
            const errorBox = document.getElementById('errorBox'), btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText'), spinner = document.getElementById('btnSpinner');

            errorBox.style.display = 'none'; btn.disabled = true; btnText.style.display = 'none'; spinner.style.display = 'inline-block';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput.value.trim(), password: passwordInput.value })
                });
                const data = await response.json();

                if (!response.ok) {
                    errorBox.innerHTML = `<i class="fa fa-exclamation-circle me-1"></i> ${data.detail || 'Fehler!'}`;
                    errorBox.style.display = 'block'; passwordInput.value = ''; btn.disabled = false; btnText.style.display = 'inline-block'; spinner.style.display = 'none'; passwordInput.focus(); return;
                }
                localStorage.setItem('isLoggedIn', 'true'); localStorage.setItem('userRole', data.role);
                window.location.href = data.redirect;
            } catch (error) {
                errorBox.innerHTML = `<i class="fa fa-exclamation-circle me-1"></i> Netzwerkfehler!`; errorBox.style.display = 'block';
                btn.disabled = false; btnText.style.display = 'inline-block'; spinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
