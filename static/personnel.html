<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal-Management | Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root { 
            --fire: #ef4444; --warn: #f59e0b; --safe: #10b981; 
            --dark: #1e293b; --bg: #f8fafc; 
        }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--dark); padding-bottom: 50px; }

        /* KARTEN & LAYOUT */
        .glass-card {
            background: white; border-radius: 16px; border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .main-table-wrapper { background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* PULSIERENDER PUNKT */
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .bg-ok { background: var(--safe); }
        .bg-warn { background: var(--warn); }
        .bg-crit { 
            background: var(--fire); 
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-red 2s infinite; 
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* QUALI BUTTONS */
        .btn-q {
            padding: 4px 10px; font-size: 0.7rem; font-weight: 700; border-radius: 6px;
            border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; margin: 2px;
        }
        .q-active { background: var(--dark); color: white; border-color: var(--dark); }
        .q-inactive { background: #f1f5f9; color: #94a3b8; }

        /* EDITABLE NAME */
        .name-edit { border: 1px dashed transparent; padding: 2px 5px; border-radius: 4px; cursor: text; transition: 0.2s; }
        .name-edit:hover { border-color: var(--warn); background: #fffcf0; }
        .name-edit:focus { border-color: var(--fire); outline: none; background: white; box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }

        /* ALARM BAR */
        .notif-bar {
            background: #fff1f2; border-left: 4px solid var(--fire); color: #991b1b;
            padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;
        }
    </style>
</head>
<body>

<div id="app" class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="fa fa-user-shield text-danger me-2"></i>Personalstamm</h2>
        <a href="/dashboard" class="btn btn-outline-dark btn-sm rounded-pill px-4">Zurück</a>
    </div>

    <div class="glass-card d-flex align-items-center flex-wrap gap-4">
        <div class="small fw-bold text-uppercase text-muted"><i class="fa fa-clock me-2"></i>Intervalle (Monate)</div>
        <div v-for="(val, key) in {G26: 'g26', Belastung: 'belastung', UVV: 'unterweisung'}" class="d-flex align-items-center gap-2">
            <span class="small">{{ key }}:</span>
            <input type="number" v-model="intervals[val]" @change="updateGlobalIntervals" class="form-control form-control-sm shadow-sm" style="width: 70px;">
        </div>
    </div>

    <div v-if="fälligePersonen.length > 0" class="notif-bar shadow-sm">
        <div>
            <i class="fa fa-exclamation-triangle me-2"></i>
            <strong>Achtung:</strong> {{ fälligePersonen.length }} Personen haben fällige Termine.
        </div>
        <div class="d-flex gap-1">
            <span v-for="p in fälligePersonen.slice(0, 5)" class="badge bg-danger">{{ p.name }}</span>
            <span v-if="fälligePersonen.length > 5" class="badge bg-secondary">+{{ fälligePersonen.length - 5 }}</span>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fa fa-search text-muted"></i></span>
                <input type="text" v-model="search" class="form-control border-start-0 shadow-none" placeholder="Nach Namen filtern...">
            </div>
        </div>
        <div class="col-md-6 text-end">
            <div class="d-inline-flex gap-2">
                <input type="text" v-model="newName" class="form-control shadow-sm" placeholder="Neues Mitglied..." @keyup.enter="addPerson">
                <button class="btn btn-danger px-4 fw-bold shadow-sm" @click="addPerson">Hinzufügen</button>
            </div>
        </div>
    </div>

    <div class="main-table-wrapper">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th style="width: 200px;">Name (Klicken zum Ändern)</th>
                    <th>Qualifikationen</th>
                    <th>G26.3</th>
                    <th>Belastung</th>
                    <th>UVV</th>
                    <th class="text-end px-4">Löschen</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="p in filteredPersonnel" :key="p.id">
                    <td>
                        <input v-model="p.name" @blur="save(p)" class="name-edit fw-bold border-0 bg-transparent w-100">
                    </td>
                    <td>
                        <span v-for="q in qualifications" @click="toggleQ(p, q.id)"
                              :class="p[q.id] ? 'q-active' : 'q-inactive'" class="btn-q">
                            {{ q.label }}
                        </span>
                    </td>
                    <td v-for="field in ['g26_3_date', 'belastungslauf_date', 'unterweisung_date']">
                        <div class="d-flex align-items-center">
                            <span :class="getStatus(p[field], field)" class="status-dot"></span>
                            <input type="date" v-model="p[field]" @change="save(p)" class="form-control form-control-sm border-0 bg-light py-0 px-1 shadow-none" style="font-size: 0.8rem;">
                        </div>
                    </td>
                    <td class="text-end px-4">
                        <button class="btn btn-link text-muted p-0" @click="deletePerson(p)"><i class="fa fa-trash-can"></i></button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const { createApp } = Vue;
createApp({
    data() {
        return {
            personnel: [], search: '', newName: '',
            intervals: { g26: 36, belastung: 12, unterweisung: 12 },
            qualifications: [
                {id: 'is_truppmann', label: 'TM'}, {id: 'is_funk', label: 'FUNK'},
                {id: 'is_agt', label: 'AGT'}, {id: 'is_maschinist', label: 'MA'},
                {id: 'is_tf', label: 'TF'}, {id: 'is_gf', label: 'GF'}
            ]
        }
    },
    computed: {
        filteredPersonnel() {
            return this.personnel.filter(p => p.name.toLowerCase().includes(this.search.toLowerCase()));
        },
        fälligePersonen() {
            return this.personnel.filter(p => {
                const results = [
                    this.getStatus(p.g26_3_date, 'g26_3_date'),
                    this.getStatus(p.belastungslauf_date, 'belastungslauf_date'),
                    this.getStatus(p.unterweisung_date, 'unterweisung_date')
                ];
                return results.includes('bg-crit') || results.includes('bg-warn');
            });
        }
    },
    methods: {
        async load() {
            const r = await fetch('/api/personnel/list');
            this.personnel = await r.json();
        },
        async loadSettings() {
            const r = await fetch('/api/personnel/settings');
            const d = await r.json();
            if(d.int_g26) this.intervals.g26 = d.int_g26;
            if(d.int_belastung) this.intervals.belastung = d.int_belastung;
            if(d.int_unterweisung) this.intervals.unterweisung = d.int_unterweisung;
        },
        async updateGlobalIntervals() {
            await fetch('/api/personnel/settings', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ int_g26: this.intervals.g26, int_belastung: this.intervals.belastung, int_unterweisung: this.intervals.unterweisung })
            });
        },
        getStatus(dateStr, field) {
            if(!dateStr) return '';
            const months = field.includes('g26') ? this.intervals.g26 : (field.includes('belastung') ? this.intervals.belastung : this.intervals.unterweisung);
            const diff = (new Date() - new Date(dateStr)) / (1000 * 60 * 60 * 24 * 30.44);
            if(diff >= months) return 'bg-crit';
            if(diff >= months - 3) return 'bg-warn';
            return 'bg-ok';
        },
        async toggleQ(p, qId) { p[qId] = !p[qId]; this.save(p); },
        async addPerson() {
            if(!this.newName) return;
            await fetch('/api/personnel/add', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: this.newName}) });
            this.newName = ''; this.load();
        },
        async save(p) {
            await fetch(`/api/personnel/update/${p.id}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: p.name,
                    is_truppmann: !!p.is_truppmann, is_funk: !!p.is_funk, is_agt: !!p.is_agt,
                    is_maschinist: !!p.is_maschinist, is_tf: !!p.is_tf, is_gf: !!p.is_gf,
                    g26_3_date: p.g26_3_date, belastungslauf_date: p.belastungslauf_date, unterweisung_date: p.unterweisung_date
                })
            });
        },
        async deletePerson(p) {
            if(confirm(`${p.name} löschen?`)) { await fetch(`/api/personnel/delete/${p.id}`, { method: 'DELETE' }); this.load(); }
        }
    },
    mounted() { this.load(); this.loadSettings(); }
}).mount('#app');
</script>
</body>
</html>
