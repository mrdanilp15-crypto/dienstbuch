<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeuerwehrHub - Mannschaftsverwaltung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=2.30">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div id="app" v-cloak>
    <nav class="navbar-top">
        <div class="navbar-brand-row">
            <div class="brand-left"><div class="brand-logo"><i class="fa fa-user-shield"></i></div><div class="brand-title">Personalkartei & Logins</div></div>
            <div class="brand-right"><a href="/dashboard" class="btn btn-sm btn-outline-light rounded-pill px-4 fw-bold">Dashboard</a></div>
        </div>
    </nav>

    <div class="main-content">
        <ul class="nav main-pills gap-2 mb-4 border-0" id="mainAdminTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active shadow-sm" id="personnel-tab" data-bs-toggle="tab" data-bs-target="#pane-personnel" type="button" role="tab">Kameraden & Lehrgänge</button></li>
            <li class="nav-item"><button class="nav-link shadow-sm" id="users-tab" data-bs-toggle="tab" data-bs-target="#pane-users" type="button" role="tab" @click="loadUsers">System-Zugriffe (Logins)</button></li>
            <li class="nav-item"><button class="nav-link shadow-sm text-danger" id="logs-tab" data-bs-toggle="tab" data-bs-target="#pane-logs" type="button" role="tab" @click="loadAuditLogs"><i class="fa fa-history me-1"></i>Sicherheits-Logbuch</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="pane-personnel" role="tabpanel">
                <div class="card mb-4 border-secondary">
                    <div class="row g-2">
                        <div class="col-md-9"><input type="text" v-model="search" class="form-control" placeholder="Mannschaft durchsuchen..."></div>
                        <div class="col-md-3"><button class="btn btn-danger w-100 rounded-3 fw-bold" @click="openNewMemberModal"><i class="fa fa-plus me-2"></i>Kamerad anlegen</button></div>
                    </div>
                </div>

                <div class="person-grid">
                    <div v-for="p in filteredPersonnel" :key="p.id" class="member-card d-flex align-items-center gap-3" @click="editMember(p)">
                        <div class="avatar-container border-secondary"><img :src="p.has_picture ? '/api/personnel/avatar/' + p.id + '?v=' + cacheBuster : 'https://via.placeholder.com/150?text=FF'"></div>
                        <div class="flex-grow-1 min-width-0">
                            <div class="d-flex justify-content-between align-items-start"><h6 class="fw-bold text-white m-0 text-truncate me-2">{{ p.name }}</h6><span :class="'badge-status status-' + getStatusClass(p.membership_status)">{{ p.membership_status }}</span></div>
                            <small class="text-muted fw-bold d-block mt-1 font-monospace" style="font-size:0.65rem;">{{ p.rank || 'Kein Dienstgrad' }}</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="pane-users" role="tabpanel">
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card p-4 border-secondary bg-dark">
                            <h5 class="fw-bold mb-3 text-white">Zugang anlegen</h5>
                            <form @submit.prevent="createUser">
                                <div class="mb-3"><label class="small fw-bold text-muted mb-1">Benutzername</label><input type="text" v-model="newUser.username" class="form-control" required></div>
                                <div class="mb-3"><label class="small fw-bold text-muted mb-1">Passwort</label><input type="password" v-model="newUser.password" class="form-control" required></div>
                                <div class="mb-3">
                                    <label class="small fw-bold text-muted mb-1">Kameraden-Zuordnung</label>
                                    <select v-model="newUser.personnel_id" class="form-select" required>
                                        <option v-for="p in personnel" :key="p.id" :value="p.id">{{ p.name }}</option>
                                    </select>
                                </div>
                                <div class="mb-3"><label class="small fw-bold text-muted mb-1">Rechte</label>
                                    <select v-model="newUser.role" class="form-select">
                                        <option value="mannschaft">Mannschaft (Lesen)</option>
                                        <option value="user">User (Schreiben)</option>
                                        <option value="admin">Admin (Vollzugriff)</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-danger w-100 rounded-pill fw-bold py-2 shadow-sm">Zugang aktivieren</button>
                            </form>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card p-4 border-secondary">
                            <table class="table align-middle">
                                <thead><tr><th>Nutzer</th><th>Akte</th><th>Rechte</th><th class="text-end">Aktion</th></tr></thead>
                                <tbody>
                                    <tr v-for="u in users" :key="u.id">
                                        <td class="fw-bold text-white">{{ u.username }}</td>
                                        <td>
                                            <select v-model="u.personnel_id" @change="updateUserPersonnelId(u)" class="form-select form-select-sm border-secondary font-monospace fw-bold bg-dark">
                                                <option v-for="p in personnel" :key="p.id" :value="p.id">{{ p.name }}</option>
                                            </select>
                                        </td>
                                        <td>
                                            <select v-model="u.role" @change="updateUserRole(u)" :disabled="u.username === 'admin'" class="form-select form-select-sm bg-dark text-white fw-bold">
                                                <option value="mannschaft">MANNSCHAFT</option><option value="user">USER</option><option value="admin">ADMIN</option>
                                            </select>
                                        </td>
                                        <td class="text-end">
                                            <button class="btn btn-sm text-warning p-1 border-0" @click="changePasswordPrompt(u)"><i class="fa fa-key"></i></button>
                                            <button class="btn btn-sm text-danger p-1 border-0" :disabled="u.username === 'admin'" @click="deleteUser(u)"><i class="fa fa-trash-alt"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="pane-logs" role="tabpanel">
                <div class="card p-4 border-secondary">
                    <table class="table table-sm font-monospace" style="font-size:0.85rem;">
                        <thead><tr><th>Zeitpunkt</th><th>Konto</th><th>Aktion</th><th>Details</th></tr></thead>
                        <tbody>
                            <tr v-for="l in auditLogs" :key="l.id">
                                <td class="text-muted">{{ l.date_formatted }}</td>
                                <td><span class="badge bg-dark">{{ l.username }}</span></td>
                                <td class="fw-bold text-danger text-uppercase">{{ l.action }}</td>
                                <td class="text-white-50">{{ l.details }}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="memberModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-dark border border-secondary text-white rounded-4 shadow-lg">
                <div class="modal-header bg-black border-bottom border-secondary py-3">
                    <h5 class="modal-title fw-bold"><i class="fa fa-id-card me-2 text-danger"></i>Digitale Stammakte</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" v-if="activePerson">
                    <div class="d-flex align-items-center gap-4 mb-4 pb-3 border-bottom border-secondary">
                        <div class="modal-avatar-upload shadow-sm border-secondary" @click="$refs.fileInput.click()">
                            <img :src="activePerson.profile_picture || (activePerson.has_picture ? '/api/personnel/avatar/' + activePerson.id + '?v=' + cacheBuster : 'https://via.placeholder.com/150?text=FF')">
                            <input type="file" ref="fileInput" class="d-none" accept="image/*" @change="onAvatarChange">
                        </div>
                        <div class="flex-grow-1">
                            <input type="text" v-model="activePerson.name" class="form-control form-control-lg fw-bold mb-2 text-white bg-dark border-secondary" placeholder="Name">
                            <div class="row g-2">
                                <div class="col-6">
                                    <select v-model="activePerson.membership_status" class="form-select">
                                        <option value="Aktiv">Aktiver Dienst</option><option value="Passiv">Passiv</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <select v-model="activePerson.rank" class="form-select">
                                        <option v-for="r in ranks" :value="r">{{ r }}</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <ul class="nav nav-tabs mb-3 border-0 bg-black p-1 rounded-3" role="tablist">
                        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-base">Stammdaten</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-qual">Lehrgänge & Lizenzen</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-health">Tauglichkeit & Fristen</button></li>
                    </ul>

                    <div class="tab-content pt-2">
                        <div class="tab-pane fade show active" id="tab-base">
                            <div class="row g-3">
                                <div class="col-md-6"><label class="small fw-bold text-muted">Geburtsdatum</label><input type="date" v-model="activePerson.birth_date" class="form-control"></div>
                                <div class="col-md-6"><label class="small fw-bold text-muted">Eintrittsdatum</label><input type="date" v-model="activePerson.entry_date" class="form-control"></div>
                                <div class="col-md-12"><label class="small fw-bold text-muted">E-Mail</label><input type="email" v-model="activePerson.email" class="form-control"></div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="tab-qual">
                            <h6 class="fw-bold text-danger mb-2 font-monospace">LEHRGÄNGE</h6>
                            <div class="row g-2 mb-3">
                                <div class="col-md-4" v-for="q in qualifications">
                                    <div class="form-check form-switch p-2 border border-secondary rounded bg-black ps-5">
                                        <input class="form-check-input" type="checkbox" :id="q.id" v-model="activePerson[q.id]">
                                        <label class="form-check-label fw-bold small" :for="q.id">{{ q.label }}</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="tab-health">
                            <div class="row g-3">
                                <div class="col-md-12" v-for="f in [{f: 'g26_3_date', l: 'G26.3 Atemschutzuntersuchung'}, {f: 'belastungslauf_date', l: 'Belastungslauf Kriechstrecke'}, {f: 'unterweisung_date', l: 'UVV Sicherheitsunterweisung'}]">
                                    <div class="p-3 border border-secondary rounded-3 bg-black d-flex justify-content-between align-items-center">
                                        <div><span :class="getHealthStatus(activePerson[f.f], f.f)" class="status-dot"></span><span class="fw-bold small text-white">{{ f.l }}</span></div>
                                        <input type="date" v-model="activePerson[f.f]" class="form-control w-auto form-control-sm border-secondary text-white font-monospace bg-dark">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-secondary bg-black d-flex justify-content-between">
                    <button type="button" class="btn btn-link text-danger fw-bold text-decoration-none shadow-none" @click="deleteActiveMember"><i class="fa fa-trash me-1"></i> Löschen</button>
                    <div class="d-flex gap-2"><button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Abbrechen</button><button type="button" class="btn btn-danger rounded-pill px-4 fw-bold shadow-sm" @click="saveActiveMember">Sichern</button></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;
createApp({
    data() {
        return {
            personnel: [], search: '', filterStatus: '', activePerson: null, modalInstance: null, cacheBuster: Date.now(),
            intervals: { g26: 36, belastung: 12, unterweisung: 12 }, auditLogs: [],
            ranks: ['Feuerwehranwärter (FWA)', 'Feuerwehrmann (FM)', 'Oberfeuerwehrmann (OFM)', 'Hauptfeuerwehrmann (HFM)', 'Löschmeister (LM)', 'Oberlöschmeister (OLM)', 'Hauptlöschmeister (HLM)'],
            qualifications: [{id: 'is_truppmann', label: 'Truppmann'}, {id: 'is_funk', label: 'Sprechfunker'}, {id: 'is_agt', label: 'Atemschutzgeräteträger'}, {id: 'is_maschinist', label: 'Maschinist'}, {id: 'is_tf', label: 'Truppführer'}, {id: 'is_gf', label: 'Gruppenführer'}],
            users: [], newUser: { username: '', password: '', role: 'mannschaft', personnel_id: null }
        }
    },
    computed: {
        filteredPersonnel() { return this.personnel.filter(p => (!this.search || p.name.toLowerCase().includes(this.search.toLowerCase())) && (!this.filterStatus || p.membership_status === this.filterStatus)); }
    },
    methods: {
        async load() { this.personnel = await (await fetch('/api/personnel/list', { credentials: 'include' })).json(); this.cacheBuster = Date.now(); },
        async loadSettings() { const d = await (await fetch('/api/personnel/settings', { credentials: 'include' })).json(); if(d.int_g26) this.intervals.g26 = d.int_g26; },
        async loadUsers() { this.users = await (await fetch('/api/users/list', { credentials: 'include' })).json(); },
        async loadAuditLogs() { this.auditLogs = await (await fetch('/api/audit/logs', { credentials: 'include' })).json(); },
        getStatusClass(s) { return s === 'Aktiv' ? 'aktiv' : 'passiv'; },
        getHealthStatus(d, f) { if(!d) return ''; const m = f.includes('g26') ? this.intervals.g26 : 12; return ((new Date() - new Date(d)) / (1000*60*60*24*30.44)) >= m ? 'bg-crit' : 'bg-ok'; },
        openNewMemberModal() { this.activePerson = { id: null, name: '', rank: 'Feuerwehrmann (FM)', membership_status: 'Aktiv', profile_picture: '', has_picture: false }; this.modalInstance.show(); },
        async editMember(p) { this.activePerson = { ...p, honors: 'Lade Akte...', profile_picture: '' }; this.modalInstance.show(); const r = await fetch(`/api/personnel/get/${p.id}`, { credentials: 'include' }); if(r.ok) { this.activePerson = await r.json(); } },
        onAvatarChange(e) { const f = e.target.files[0]; const r = new FileReader(); r.onload = (ex) => { this.activePerson.profile_picture = ex.target.result; }; r.readAsDataURL(f); },
        async createUser() { if(await fetch('/api/users/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(this.newUser) })) { this.newUser = { username: '', password: '', role: 'mannschaft', personnel_id: null }; await this.loadUsers(); } },
        async updateUserRole(u) { await fetch(`/api/users/${u.id}/role`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ role: u.role }) }); },
        async updateUserPersonnelId(u) { await fetch(`/api/users/${u.id}/personnel`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify({ personnel_id: u.personnel_id }) }); this.loadUsers(); },
        async deleteUser(u) { if(confirm("Konto löschen?")) { await fetch(`/api/users/${u.id}`, { method: 'DELETE', credentials: 'include' }); await this.loadUsers(); } },
        async saveActiveMember() { const endpoint = this.activePerson.id === null ? '/api/personnel/add' : `/api/personnel/update/${this.activePerson.id}`; await fetch(endpoint, { method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include', body: JSON.stringify(this.activePerson) }); this.load(); this.modalInstance.hide(); },
        async deleteActiveMember() { if(confirm("Akte löschen?")) { await fetch(`/api/personnel/delete/${this.activePerson.id}`, { method: 'DELETE', credentials: 'include' }); this.load(); this.modalInstance.hide(); } }
    },
    mounted() { this.modalInstance = new bootstrap.Modal(document.getElementById('memberModal')); this.load(); this.loadSettings(); }
}).mount('#app');
</script>
</body>
</html>
