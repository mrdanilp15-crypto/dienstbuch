<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalverwaltung - Dienstbuch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; border: none; }
        .table thead { background: #f8f9fa; }
        .status-badge { width: 40px; text-align: center; cursor: pointer; }
        .bg-success-light { background-color: #d1e7dd; color: #0f5132; }
        .bg-danger-light { background-color: #f8d7da; color: #842029; }
        .sticky-top-custom { position: sticky; top: 20px; z-index: 100; }
    </style>
</head>
<body>
    <div id="app" class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fa fa-users-gear me-2 text-danger"></i>Personalverwaltung</h1>
            <a href="/dashboard" class="btn btn-outline-secondary rounded-pill">
                <i class="fa fa-arrow-left me-1"></i> Zurück
            </a>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title small fw-bold text-muted text-uppercase mb-3">Neues Mitglied anlegen</h5>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 rounded-start-pill">
                        <i class="fa fa-user text-muted"></i>
                    </span>
                    <input type="text" v-model="newName" class="form-control border-start-0 ps-0" placeholder="Vorname Nachname" @keyup.enter="addPerson">
                    <button class="btn btn-danger rounded-end-pill px-4" @click="addPerson">
                        <i class="fa fa-plus me-2"></i>Hinzufügen
                    </button>
                </div>
                <div class="form-text mt-2 ps-2">Hinweis: Neue Personen werden automatisch der ersten Gruppe im Editor zugeordnet.</div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body py-2">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <input type="text" v-model="search" class="form-control form-control-sm border-0" placeholder="Suchen nach Namen oder Abteilungen...">
                    </div>
                    <div class="col-md-4 text-end">
                        <span class="badge bg-secondary rounded-pill">{{ filteredPersonnel.length }} Personen</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Abteilung</th>
                            <th class="text-center">TM</th>
                            <th class="text-center">Funk</th>
                            <th class="text-center">AGT</th>
                            <th class="text-center">Masch.</th>
                            <th class="text-center">GF</th>
                            <th>G26.3 / Belastung / Unterw.</th>
                            <th class="text-end">Aktion</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="p in filteredPersonnel" :key="p.id">
                            <td>
                                <div class="fw-bold">{{ p.name }}</div>
                            </td>
                            <td>
                                <span class="badge bg-light text-dark border">{{ p.group_name || 'Keine Gruppe' }}</span>
                            </td>
                            <td v-for="skill in ['is_truppmann', 'is_funk', 'is_agt', 'is_maschinist', 'is_gf']" class="text-center">
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="checkbox" v-model="p[skill]" @change="savePerson(p)">
                                </div>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <input type="date" v-model="p.g26_3_date" class="form-control form-control-sm" title="G26.3" @change="savePerson(p)">
                                    <input type="date" v-model="p.belastungslauf_date" class="form-control form-control-sm" title="Belastungslauf" @change="savePerson(p)">
                                    <input type="date" v-model="p.unterweisung_date" class="form-control form-control-sm" title="Unterweisung" @change="savePerson(p)">
                                </div>
                            </td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-danger border-0" @click="deletePerson(p.id)">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    personnel: [],
                    search: '',
                    newName: ''
                }
            },
            computed: {
                filteredPersonnel() {
                    const s = this.search.toLowerCase();
                    return this.personnel.filter(p => 
                        p.name.toLowerCase().includes(s) || 
                        (p.group_name && p.group_name.toLowerCase().includes(s))
                    );
                }
            },
            methods: {
                async loadPersonnel() {
                    const r = await fetch('/api/personnel/list');
                    this.personnel = await r.json();
                },
                async addPerson() {
                    if (!this.newName) return;
                    const r = await fetch('/api/personnel/add', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ name: this.newName })
                    });
                    if (r.ok) {
                        this.newName = '';
                        this.loadPersonnel();
                    } else {
                        const err = await r.json();
                        alert(err.detail);
                    }
                },
                async savePerson(p) {
                    await fetch(`/api/personnel/update/${p.id}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            is_truppmann: !!p.is_truppmann,
                            is_funk: !!p.is_funk,
                            is_agt: !!p.is_agt,
                            is_maschinist: !!p.is_maschinist,
                            is_gf: !!p.is_gf,
                            g26_3_date: p.g26_3_date || null,
                            belastungslauf_date: p.belastungslauf_date || null,
                            unterweisung_date: p.unterweisung_date || null
                        })
                    });
                },
                async deletePerson(id) {
                    if (!confirm("Person wirklich löschen? Sie wird auch aus dem Editor entfernt.")) return;
                    await fetch(`/persons/${id}`, { method: 'DELETE' });
                    this.loadPersonnel();
                }
            },
            mounted() {
                this.loadPersonnel();
            }
        }).mount('#app');
    </script>
</body>
</html>
