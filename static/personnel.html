<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal-Management | Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root { 
            --fire: #ef4444; --warn: #f59e0b; --safe: #10b981; 
            --dark: #0f172a; --bg: #f8fafc; --accent: #3b82f6;
        }
        body { background: var(--bg); font-family: 'Inter', system-ui, sans-serif; color: var(--dark); padding-bottom: 80px; }

        /* HEADER & STATS */
        .page-header { background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%); color: white; padding: 2rem 0; border-radius: 0 0 24px 24px; margin-bottom: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .stat-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 16px; padding: 1.25rem;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .stat-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }
        .stat-val { font-size: 1.75rem; font-weight: 800; display: block; line-height: 1; margin-bottom: 0.25rem; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; font-weight: 700; letter-spacing: 0.05em; }

        /* SEARCH & ADD */
        .action-card { background: white; border-radius: 16px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .search-input { background: #f1f5f9; border: none; border-radius: 12px; padding: 0.6rem 1rem; }

        /* PERSON CARDS (Desktop) */
        .person-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .person-card { 
            background: white; border-radius: 16px; padding: 1.5rem; border: 1px solid #e2e8f0;
            transition: all 0.2s ease-in-out; position: relative; overflow: hidden;
        }
        .person-card:hover { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); border-color: #cbd5e1; }
        
        .name-input { font-weight: 800; border: none; background: transparent; font-size: 1.25rem; color: var(--dark); margin-bottom: 1rem; padding: 0; }
        .name-input:focus { outline: none; border-bottom: 2px solid var(--fire); }

        /* DATES */
        .date-section { background: #f8fafc; border-radius: 12px; padding: 1rem; margin-top: 1rem; }
        .date-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
        .date-row:last-child { margin-bottom: 0; }
        .date-label { font-size: 0.75rem; font-weight: 700; color: #64748b; }
        .date-input { 
            border: 1px solid #e2e8f0; border-radius: 8px; padding: 4px 8px; 
            font-size: 0.85rem; background: white; width: 130px;
        }

        /* STATUS DOTS */
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .bg-ok { background: var(--safe); box-shadow: 0 0 8px var(--safe); }
        .bg-warn { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
        .bg-crit { background: var(--fire); box-shadow: 0 0 8px var(--fire); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        /* QUALIFICATIONS */
        .q-badge-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .btn-q {
            padding: 6px 10px; font-size: 0.7rem; font-weight: 800; border-radius: 8px;
            border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .q-active { background: var(--dark); color: white; border-color: var(--dark); }
        .q-inactive { background: #fff; color: #94a3b8; }
        .q-active:hover { background: var(--fire); border-color: var(--fire); }

        .btn-delete { color: #cbd5e1; transition: 0.2s; }
        .btn-delete:hover { color: var(--fire); }

        @media (max-width: 768px) {
            .person-grid { grid-template-columns: 1fr; }
            .page-header { border-radius: 0; }
        }
    </style>
</head>
<body>

<div id="app">
    <header class="page-header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-black m-0"><i class="fa fa-shield-halved me-3"></i>Personal Pro</h2>
                <a href="/dashboard" class="btn btn-light btn-sm rounded-pill px-4 fw-bold">Zurück</a>
            </div>
            <div class="row g-3">
                <div class="col-6 col-md-3" v-for="stat in stats">
                    <div class="stat-card">
                        <span class="stat-val">{{ stat.count }}</span>
                        <span class="stat-label">{{ stat.label }}</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card action-card mb-5">
            <div class="card-body p-4">
                <div class="row g-3">
                    <div class="col-12 col-md-5">
                        <div class="position-relative">
                            <i class="fa fa-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                            <input type="text" v-model="search" class="form-control search-input ps-5" placeholder="Mitglieder filtern...">
                        </div>
                    </div>
                    <div class="col-12 col-md-7">
                        <div class="input-group">
                            <input type="text" v-model="newName" class="form-control border-0 bg-light" placeholder="Neues Mitglied (Vorname Nachname)" @keyup.enter="addPerson">
                            <button class="btn btn-danger px-4 fw-bold" @click="addPerson"><i class="fa fa-plus me-2"></i>Hinzufügen</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="person-grid">
            <div v-for="p in filteredPersonnel" :key="p.id" class="person-card">
                <div class="d-flex justify-content-between align-items-start">
                    <input v-model="p.name" @blur="save(p)" class="name-input" placeholder="Name...">
                    <button class="btn btn-link btn-delete p-0" @click="deletePerson(p)">
                        <i class="fa fa-trash-can"></i>
                    </button>
                </div>

                <div class="q-badge-container mb-3">
                    <span v-for="q in qualifications" @click="toggleQ(p, q.id)"
                          :class="p[q.id] ? 'q-active' : 'q-inactive'" class="btn-q">
                        {{ q.label }}
                    </span>
                </div>

                <div class="date-section">
                    <div class="date-row" v-for="field in [{f: 'g26_3_date', l: 'G26.3 Untersuchung'}, {f: 'belastungslauf_date', l: 'Belastungslauf'}, {f: 'unterweisung_date', l: 'UVV Unterweisung'}]">
                        <div class="d-flex align-items-center">
                            <span :class="getStatus(p[field.f], field.f)" class="status-dot"></span>
                            <span class="date-label">{{ field.l }}</span>
                        </div>
                        <input type="date" v-model="p[field.f]" @change="save(p)" class="date-input">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;
createApp({
    data() {
        return {
            personnel: [], search: '', newName: '',
            intervals: { g26: 36, belastung: 12, unterweisung: 12 },
            qualifications: [
                {id: 'is_truppmann', label: 'TM'}, {id: 'is_funk', label: 'Funk'},
                {id: 'is_agt', label: 'AGT'}, {id: 'is_maschinist', label: 'Ma'},
                {id: 'is_tf', label: 'TF'}, {id: 'is_gf', label: 'GF'}
            ]
        }
    },
    computed: {
        filteredPersonnel() {
            return this.personnel.filter(p => p.name.toLowerCase().includes(this.search.toLowerCase()));
        },
        stats() {
            return [
                { label: 'Gesamtstärke', count: this.personnel.length },
                { label: 'Atemschutz', count: this.personnel.filter(p => p.is_agt).length },
                { label: 'Maschinisten', count: this.personnel.filter(p => p.is_maschinist).length },
                { label: 'Führungskräfte', count: this.personnel.filter(p => p.is_gf || p.is_tf).length }
            ];
        }
    },
    methods: {
        async load() {
            const r = await fetch('/api/personnel/list');
            this.personnel = await r.json();
        },
        async loadSettings() {
            const r = await fetch('/api/personnel/settings');
            const d = await r.json();
            if(d.int_g26) this.intervals.g26 = d.int_g26;
            if(d.int_belastung) this.intervals.belastung = d.int_belastung;
            if(d.int_unterweisung) this.intervals.unterweisung = d.int_unterweisung;
        },
        getStatus(dateStr, field) {
            if(!dateStr) return '';
            const months = field.includes('g26') ? this.intervals.g26 : (field.includes('belastung') ? this.intervals.belastung : this.intervals.unterweisung);
            const diff = (new Date() - new Date(dateStr)) / (1000 * 60 * 60 * 24 * 30.44);
            if(diff >= months) return 'bg-crit';
            if(diff >= months - 3) return 'bg-warn';
            return 'bg-ok';
        },
        async toggleQ(p, qId) { p[qId] = !p[qId]; this.save(p); },
        async addPerson() {
            if(!this.newName) return;
            await fetch('/api/personnel/add', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: this.newName}) });
            this.newName = ''; this.load();
        },
        async save(p) {
            await fetch(`/api/personnel/update/${p.id}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: p.name,
                    is_truppmann: !!p.is_truppmann, is_funk: !!p.is_funk, is_agt: !!p.is_agt,
                    is_maschinist: !!p.is_maschinist, is_tf: !!p.is_tf, is_gf: !!p.is_gf,
                    g26_3_date: p.g26_3_date, belastungslauf_date: p.belastungslauf_date, unterweisung_date: p.unterweisung_date
                })
            });
        },
        async deletePerson(p) {
            if(confirm(`${p.name} wirklich löschen?`)) { await fetch(`/api/personnel/delete/${p.id}`, { method: 'DELETE' }); this.load(); }
        }
    },
    mounted() { this.load(); this.loadSettings(); }
}).mount('#app');
</script>
</body>
</html>
