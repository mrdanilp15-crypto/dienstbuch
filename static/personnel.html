<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeuerwehrHub - Personalverwaltung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=2.30">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div id="app" v-cloak>
    <header class="page-header">
        <div class="container d-flex justify-content-between align-items-center">
            <h2 class="fw-black m-0 text-white tracking-tight"><i class="fa fa-users me-3"></i>Personalverwaltung Pro</h2>
            <a href="/dashboard" class="btn btn-light btn-sm rounded-pill px-4 fw-bold">Dashboard</a>
        </div>
    </header>

    <div class="container shadow-sm p-2">
        <div class="card p-3 mb-4 border-0">
            <div class="row g-2">
                <div class="col-md-9"><input type="text" v-model="search" class="form-control border-0 bg-light rounded-3 py-2" style="font-size:0.95rem;" placeholder="Kameraden durchsuchen..."></div>
                <div class="col-md-3"><button class="btn btn-danger w-100 rounded-3 fw-bold py-2" @click="openNewMemberModal"><i class="fa fa-plus me-2"></i>Kamerad anlegen</button></div>
            </div>
        </div>

        <!-- Korrektes Flex-Grid aus FeuerwehrHub -->
        <div class="person-grid">
            <div v-for="p in filteredPersonnel" :key="p.id" class="member-card d-flex align-items-center gap-3 p-3 bg-white" @click="editMember(p)">
                <div class="avatar-container shadow-sm">
                    <img :src="p.has_picture ? '/api/personnel/avatar/' + p.id + '?v=' + cacheBuster : 'https://via.placeholder.com/150?text=FF'">
                </div>
                <div class="flex-grow-1 min-width-0">
                    <h6 class="fw-bold m-0 text-dark text-truncate mb-1">{{ p.name }}</h6>
                    <small class="text-muted fw-bold font-monospace text-uppercase d-block" style="font-size:0.65rem;">{{ p.rank || 'Kein Dienstgrad' }}</small>
                    <span :class="['badge mt-2', p.membership_status == 'Aktiv' ? 'bg-success' : 'bg-secondary']">{{ p.membership_status }}</span>
                </div>
            </div>
        </div>
    </div>

    <!-- DIGITALE STAMMAKTE MODAL -->
    <div class="modal fade" id="memberModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header bg-dark text-white"><h5 class="modal-title fw-bold">Stammakte bearbeiten</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body p-4" v-if="activePerson">
                    <div class="mb-3"><label class="small fw-bold text-muted mb-1">Vollständiger Name</label><input type="text" v-model="activePerson.name" class="form-control bg-light border-0 rounded-3"></div>
                    <div class="mb-3"><label class="small fw-bold text-muted mb-1">Dienstgrad</label><input type="text" v-model="activePerson.rank" class="form-control bg-light border-0 rounded-3"></div>
                    <div class="mb-3"><label class="small fw-bold text-muted mb-1">Abteilung / Status</label>
                        <select v-model="activePerson.membership_status" class="form-select bg-light border-0 rounded-3">
                            <option value="Aktiv">Aktiver Dienst</option><option value="Passiv">Passiv / Fördernd</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-0"><button class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Abbrechen</button><button class="btn btn-danger rounded-pill px-4 fw-bold shadow-sm" @click="saveActiveMember">Änderungen sichern</button></div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;
createApp({
    data() { return { personnel: [], search: '', activePerson: null, modalInstance: null, cacheBuster: Date.now() } },
    computed: { filteredPersonnel() { return this.personnel.filter(p => !this.search || p.name.toLowerCase().includes(this.search.toLowerCase())); } },
    methods: {
        async load() { this.personnel = await (await fetch('/api/personnel/list')).json(); this.cacheBuster = Date.now(); },
        openNewMemberModal() { this.activePerson = { id: null, name: '', rank: '', membership_status: 'Aktiv' }; this.modalInstance.show(); },
        async editMember(p) { this.activePerson = await (await fetch(`/api/personnel/get/${p.id}`)).json(); this.modalInstance.show(); },
        async saveActiveMember() {
            const endpoint = this.activePerson.id === null ? '/api/personnel/add' : `/api/personnel/update/${this.activePerson.id}`;
            await fetch(endpoint, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(this.activePerson) });
            this.load(); this.modalInstance.hide();
        }
    },
    mounted() { this.modalInstance = new bootstrap.Modal(document.getElementById('memberModal')); this.load(); }
}).mount('#app');
</script>
</body>
</html>
