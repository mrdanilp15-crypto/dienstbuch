<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dienstbuch Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=2.30">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .header-bar { background: white; border-bottom: 3px solid var(--fh-fire); padding: 10px 15px; position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-cat { border: 2px solid transparent; opacity: 0.5; transition: 0.3s; font-weight: bold; color: #666; }
        .btn-cat:hover { opacity: 0.8; }
        .btn-cat-Übung.active { background-color: var(--fh-exercise) !important; color: white !important; opacity: 1; transform: scale(1.02); }
        .btn-cat-Einsatz.active { background-color: var(--fh-incident) !important; color: white !important; opacity: 1; transform: scale(1.02); }
        .btn-cat-Sonstiges.active { background-color: var(--fh-misc) !important; color: black !important; opacity: 1; transform: scale(1.02); }
        .vehicle-btn { padding: 4px 10px; font-size: 0.75rem; border-radius: 6px; border: 1px solid #e2e8f0; background: white; color: #64748b; font-weight:600; }
        .vehicle-btn.active { background: var(--fh-fire) !important; color: white !important; border-color: var(--fh-fire); }
        .save-indicator { position: fixed; bottom: 85px; right: 20px; z-index: 999; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; z-index: 1000; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="header-bar">
        <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" @click="goBack"><i class="fas fa-chevron-left me-1"></i> Zurück</button>
        <h5 class="m-0 fw-bold">Dienstbuch Protokoll-Editor</h5>
        <div>
            <span v-if="isReadOnly" class="badge bg-secondary"><i class="fa fa-eye me-1"></i> Schreibgeschützt</span>
            <span v-else-if="isAdmin" class="badge bg-danger">Admin</span>
            <span v-else class="badge bg-primary">User</span>
        </div>
    </div>

    <div class="main-content mx-auto" style="max-width: 900px; padding-bottom: 140px;">
        <div class="card p-4">
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="small text-muted fw-bold mb-1">DATUM</label>
                    <input type="date" class="form-control rounded-3" v-model="currentDate" @change="autoSave" :disabled="isReadOnly">
                </div>
                <div class="col-6">
                    <label class="small text-muted fw-bold mb-1">DAUER (Std.)</label>
                    <input type="number" step="0.5" class="form-control rounded-3" v-model="duration" @input="autoSave" :disabled="isReadOnly">
                </div>
            </div>

            <label class="small text-muted fw-bold mb-1">KATEGORIE</label>
            <div class="d-flex gap-2 mb-3">
                <button v-for="cat in ['Übung', 'Einsatz', 'Sonstiges']" :key="cat" @click="setCat(cat)" :class="['btn', 'flex-fill', 'btn-cat', 'btn-cat-' + cat, category === cat ? 'active' : 'bg-light']">{{cat}}</button>
            </div>

            <div class="mb-3">
                <label class="small text-muted fw-bold mb-1">THEMA / BESCHREIBUNG</label>
                <input list="topicList" class="form-control rounded-3" v-model="description" @input="autoSave" placeholder="Ausbildungsinhalt..." :disabled="isReadOnly">
                <datalist id="topicList"><option v-for="t in topicOptions" :key="t" :value="t"></option></datalist>
            </div>

            <div class="mb-0">
                <label class="small text-muted fw-bold mb-1">ÜBUNGSLEITUNG / AUSBILDER</label>
                <input list="instrList" class="form-control rounded-3" v-model="instructors" @input="autoSave" placeholder="Name(n)..." :disabled="isReadOnly">
                <datalist id="instrList"><option v-for="i in instrOptions" :key="i" :value="i"></option></datalist>
            </div>
        </div>

        <div class="card p-4 mb-3">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <span class="small text-muted fw-bold d-block">BESTÄTIGUNG ÜBUNGSLEITUNG</span>
                    <small v-if="!leaderSignature" class="text-danger fw-bold">Handzeichen fehlt</small>
                    <small v-else class="text-success fw-bold">Erfasst <i class="fas fa-check"></i></small>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <button v-if="leaderSignature && !isReadOnly" class="btn btn-sm btn-outline-secondary rounded-circle" @click="clearLeaderSig"><i class="fas fa-undo"></i></button>
                    <div class="sig-box shadow-sm" @click="openSig('LEADER')">
                        <img v-if="leaderSignature" :src="leaderSignature">
                        <i v-else class="fas fa-pen text-muted"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center px-1 mb-2 mt-4">
            <h6 class="m-0 fw-bold text-dark">Anwesenheit ({{presentCount}}/{{persons.length}})</h6>
            <button v-if="!isReadOnly" class="btn btn-sm btn-danger rounded-pill px-3 fw-bold" style="background:var(--fh-fire);" data-bs-toggle="modal" data-bs-target="#poolModal"><i class="fas fa-plus me-1"></i> Personen hinzufügen</button>
        </div>

        <div class="card overflow-hidden p-0">
            <div class="p-2 bg-light border-bottom">
                <input type="text" class="form-control form-control-sm rounded-2" v-model="q" placeholder="Suchen...">
            </div>
            
            <div v-for="p in filtered" :key="p.id || p.person_id" class="person-row" :class="{absent: !p.is_present, 'g26-expired-alert': p.g26_expired}">
                <div class="d-flex align-items-center gap-3 flex-grow-1">
                    <input type="checkbox" class="form-check-input" style="transform: scale(1.2)" :checked="p.is_present" @change="togglePresence(p)" :disabled="isReadOnly">
                    <div class="editor-avatar shadow-sm">
                        <img :src="p.has_picture ? '/api/personnel/avatar/' + p.personnel_id + '?v=' + cacheBuster : 'https://via.placeholder.com/150?text=FF'">
                    </div>
                    <div class="name-area" @click="togglePresence(p)" style="cursor:pointer;">
                        <span class="fw-bold text-dark">{{p.name}}</span>
                        <span v-if="p.g26_expired" class="g26-crit-text"><i class="fa fa-triangle-exclamation me-1"></i> G26.3 abgelaufen! Atemschutzverbot!</span>
                        
                        <div class="d-flex gap-1 mt-2 overflow-auto pb-1" v-if="globalVehicles.length">
                            <button v-for="v in globalVehicles" :key="v.id" @click.stop="setVehicle(p, v.name)" :class="['vehicle-btn', p.vehicle === v.name ? 'active' : '']">{{v.name}}</button>
                        </div>
                    </div>
                </div>

                <div class="ms-2 d-flex align-items-center gap-2 flex-shrink-0">
                    <button v-if="p.signature && !isReadOnly" class="btn btn-sm text-muted p-1 border-0 bg-transparent" @click.stop="clearP(p)"><i class="fas fa-eraser"></i></button>
                    <div class="sig-box shadow-sm" @click.stop="openSig(p)">
                        <img v-if="p.signature" :src="p.signature">
                        <i v-else class="fas fa-signature text-muted"></i>
                    </div>
                    <button v-if="isAdmin && !isReadOnly" class="btn btn-sm text-danger p-1 border-0 bg-transparent" @click.stop="removePerson(p)"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="save-indicator" v-if="!isReadOnly">
        <span v-if="saveState === 'saving'" class="badge bg-warning text-dark p-2 shadow-sm"><i class="fas fa-sync fa-spin me-1"></i> Speichert...</span>
        <span v-if="saveState === 'saved'" class="badge bg-success p-2 shadow-sm"><i class="fas fa-check me-1"></i> Änderungen gesichert</span>
    </div>

    <div class="bottom-nav">
        <button class="btn btn-dark flex-fill py-2.5 fw-bold rounded-pill" @click="saveAndExit">{{ isReadOnly ? 'EDITOR BEENDEN' : 'BEENDEN & PROTOKOLL SCHLIESSEN' }}</button>
    </div>

    <div class="modal fade" id="poolModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header bg-light border-0 pb-0">
                    <h5 class="modal-title fw-bold">Mannschaft laden</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex gap-2 mb-3">
                        <input type="text" class="form-control rounded-3" v-model="poolSearch" placeholder="Name suchen...">
                        <button class="btn btn-outline-secondary text-nowrap rounded-3 fw-bold" @click="selectAllPool">Alle toggeln</button>
                    </div>
                    <div class="list-group list-group-flush border rounded-3 overflow-y-auto" style="max-height: 380px;">
                        <div v-for="p in filteredPool" :key="p.id" class="pool-item d-flex align-items-center p-2 border-bottom" @click="p.selected = !p.selected" style="cursor:pointer;">
                            <input type="checkbox" class="form-check-input me-3" v-model="p.selected" @click.stop>
                            <span class="fw-semibold text-dark">{{p.name}}</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0"><button type="button" class="btn btn-danger rounded-pill px-4 fw-bold" style="background:var(--fh-fire);" @click="addSelectedFromPool">Hinzufügen</button></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="sigModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-body p-4 text-center">
                    <div class="sig-wrapper mb-3"><canvas id="sigCanvas"></canvas></div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary flex-fill rounded-pill" @click="clearModal">Löschen</button>
                        <button class="btn btn-danger flex-fill rounded-pill fw-bold shadow-sm" style="background:var(--fh-fire);" @click="saveSig">Speichern</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    let sigPad = null, sigModal = null, saveTimer = null;

    createApp({
        data() {
            return {
                isAdmin: false, isReadOnly: false, groupId: null, sessionId: null,
                globalVehicles: [], persons: [], pool: [], topicOptions: [], instrOptions: [],
                q: '', poolSearch: '', category: 'Übung', duration: 2.0,
                description: '', instructors: '', leaderSignature: null,
                currentDate: new Date().toISOString().split('T')[0],
                saveState: 'idle', activeSigner: null, isLoading: true, cacheBuster: Date.now()
            }
        },
        computed: {
            presentCount() { return this.persons.filter(p => p.is_present).length; },
            filtered() {
                let list = [...this.persons];
                if (this.q) list = list.filter(p => p.name.toLowerCase().includes(this.q.toLowerCase()));
                return list.sort((a, b) => a.name.localeCompare(b.name));
            },
            filteredPool() {
                const s = this.poolSearch.toLowerCase();
                return this.pool.filter(p => {
                    const exists = this.persons.find(x => String(x.id || x.person_id) === String(p.id) || x.name === p.name);
                    return p.name.toLowerCase().includes(s) && !exists;
                });
            }
        },
        async mounted() {
            try {
                const authRes = await fetch('/api/auth/me', { credentials: 'include' });
                if (!authRes.ok) { window.location.href = '/'; return; }
                const authData = await authRes.json();
                this.isAdmin = (authData.role === 'admin'); this.isReadOnly = (authData.role === 'mannschaft'); 
            } catch (e) { window.location.href = '/'; return; }

            const p = new URLSearchParams(window.location.search);
            this.groupId = p.get('group_id'); this.sessionId = p.get('session_id');
            
            try { const vRes = await fetch('/api/vehicles', { credentials: 'include' }); this.globalVehicles = await vRes.json(); } catch(e) {}
            try { const pRes = await fetch('/api/personnel/list', { credentials: 'include' }); const pData = await pRes.json(); this.pool = pData.map(m => ({...m, selected: false})); } catch(e) {}

            await this.load(); this.isLoading = false; 
            try {
                this.topicOptions = await (await fetch(`/groups/${this.groupId}/topics`, { credentials: 'include' })).json();
                this.instrOptions = await (await fetch(`/groups/${this.groupId}/instructors`, { credentials: 'include' })).json();
            } catch(e) {}

            sigModal = new bootstrap.Modal(document.getElementById('sigModal'));
            sigPad = new SignaturePad(document.getElementById('sigCanvas'), { backgroundColor: 'rgb(255, 255, 255)' });
        },
        methods: {
            async load() {
                if(!this.groupId) return;
                try {
                    const d = await (await fetch(`/groups/${this.groupId}/attendance${this.sessionId ? '?session_id='+this.sessionId : ''}`, { credentials: 'include' })).json();
                    if(d.persons) this.persons = d.persons.map(p => ({ ...p, id: p.id || p.person_id }));
                    if(d.session_id || d.id) {
                        this.sessionId = d.session_id || d.id; this.category = d.category || 'Übung';
                        this.duration = d.duration || 2.0; this.description = d.description || '';
                        this.instructors = d.instructors || ''; this.currentDate = d.date || this.currentDate;
                        this.leaderSignature = d.leader_signature || d.signature || null;
                    }
                    this.cacheBuster = Date.now();
                } catch(e) {}
            },
            autoSave() { if(this.isReadOnly || this.isLoading) return; this.saveState = 'saving'; clearTimeout(saveTimer); saveTimer = setTimeout(this.performSave, 1000); },
            async performSave() {
                if(!this.groupId || this.isLoading || this.isReadOnly) return;
                const data = {
                    session_id: this.sessionId ? parseInt(this.sessionId) : null, date: this.currentDate, group_id: parseInt(this.groupId),
                    category: this.category, duration: parseFloat(this.duration), description: this.description, instructors: this.instructors, leader_signature: this.leaderSignature,
                    entries: this.persons.map(p => ({ person_id: p.id || p.person_id, is_present: !!p.is_present, vehicle: p.vehicle || "", signature: p.signature || null, note: p.note || "" }))
                };
                try {
                    const rd = await (await fetch('/attendance', { method:'POST', headers:{'Content-Type':'application/json'}, credentials: 'include', body:JSON.stringify(data) })).json();
                    if(rd.session_id && !this.sessionId) { this.sessionId = rd.session_id; window.history.replaceState({}, '', `${window.location.pathname}?group_id=${this.groupId}&session_id=${this.sessionId}`); }
                    this.saveState = 'saved'; setTimeout(() => this.saveState = 'idle', 2000);
                } catch(e) { this.saveState = 'idle'; }
            },
            removePerson(p) { if(this.isReadOnly) return; if(confirm(p.name + " entfernen?")) { this.persons = this.persons.filter(x => String(x.id || x.person_id) !== String(p.id || p.person_id)); this.autoSave(); } },
            selectAllPool() { if(this.isReadOnly) return; const allSelected = this.filteredPool.every(p => p.selected); this.filteredPool.forEach(p => p.selected = !allSelected); },
            async addSelectedFromPool() {
                if(this.isReadOnly) return;
                this.pool.filter(p => p.selected).forEach(sp => {
                    if(!this.persons.find(x => String(x.id || x.person_id) === String(sp.id) || x.name === sp.name)) {
                        this.persons.push({ id: sp.id, name: sp.name, is_present: true, vehicle: '', signature: null, personnel_id: sp.id, has_picture: sp.has_picture, g26_expired: sp.g26_expired });
                    }
                });
                this.pool.forEach(p => p.selected = false); bootstrap.Modal.getInstance(document.getElementById('poolModal')).hide(); this.autoSave();
            },
            togglePresence(p) { if(this.isReadOnly) return; p.is_present = !p.is_present; this.autoSave(); },
            setVehicle(p,v) { if(this.isReadOnly) return; p.vehicle = (p.vehicle===v) ? '' : v; if(p.vehicle) p.is_present = true; this.autoSave(); },
            setCat(c) { if(this.isReadOnly) return; this.category = c; this.autoSave(); },
            openSig(t) {
                if(this.isReadOnly) return; this.activeSigner = t; sigModal.show();
                setTimeout(() => {
                    const c = document.getElementById('sigCanvas'); c.width = c.offsetWidth; c.height = c.offsetHeight; sigPad.clear();
                    if(t !== 'LEADER' && t.signature) { sigPad.fromDataURL(t.signature); }
                    else if (t === 'LEADER' && this.leaderSignature) { sigPad.fromDataURL(this.leaderSignature); }
                }, 200);
            },
            saveSig() {
                if(this.isReadOnly) return;
                if(!sigPad.isEmpty()) {
                    const data = sigPad.toDataURL();
                    if(this.activeSigner === 'LEADER') { this.leaderSignature = data; }
                    else { this.activeSigner.signature = data; this.activeSigner.is_present = true; }
                    this.autoSave();
                }
                sigModal.hide();
            },
            clearModal() { sigPad.clear(); },
            clearLeaderSig() { if(this.isReadOnly) return; this.leaderSignature = null; this.autoSave(); },
            clearP(p) { if(this.isReadOnly) return; p.signature = null; this.autoSave(); },
            goBack() { window.location.href = '/dashboard'; },
            saveAndExit() { if(this.isReadOnly) { this.goBack(); } else { this.performSave().then(() => this.goBack()); } }
        }
    }).mount('#app');
</script>
</body>
</html>
