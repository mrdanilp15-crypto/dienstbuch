<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dienstbuch Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=5.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { padding-bottom: 100px; background: #f8fafc; }
        .vehicle-btn-select { padding: 4px 10px; font-size: 0.75rem; border-radius: 6px; border: 1px solid var(--fh-border); background: #ffffff; color: var(--fh-text-muted); font-weight: bold; }
        .vehicle-btn-select.active { background: var(--fh-fire) !important; color: white !important; border-color: var(--fh-fire); }
        .bottom-nav-action { position: fixed; bottom: 0; left: 0; right: 0; background: #ffffff; padding: 15px; border-top: 2px solid var(--fh-border); z-index: 1020; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="bg-white p-3 border-bottom shadow-sm sticky-top d-flex justify-content-between align-items-center mb-4">
        <h5 class="m-0 fw-bold text-dark"><i class="fa fa-pen-nib text-danger me-2"></i>Dienstbuch Editor</h5>
        <button class="btn btn-sm btn-outline-dark rounded-pill px-3 fw-bold" @click="goBack"><i class="fas fa-chevron-left me-1"></i> Abbrechen</button>
    </div>

    <div class="container" style="max-width: 900px;">
        <div class="card bg-white shadow-sm border-0">
            <div class="row g-3 mb-3">
                <div class="col-6"><label class="small text-muted fw-bold mb-1">DATUM</label><input type="date" class="form-control bg-light" v-model="currentDate"></div>
                <div class="col-6"><label class="small text-muted fw-bold mb-1">DAUER (STD)</label><input type="number" step="0.5" class="form-control bg-light" v-model="duration"></div>
            </div>
            <div class="mb-3"><label class="small text-muted fw-bold mb-1">THEMA / BESCHREIBUNG</label><input type="text" class="form-control bg-light" v-model="description" placeholder="Was wurde gemacht?"></div>
            <div><label class="small text-muted fw-bold mb-1">AUSBILDER</label><input type="text" class="form-control bg-light" v-model="instructors" placeholder="Name..."></div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2 px-1">
            <h6 class="m-0 fw-bold text-dark">Mannschaftsliste (Anwesend: {{ presentCount }})</h6>
        </div>

        <div class="card p-0 overflow-hidden border-0 shadow-sm bg-white">
            <div class="p-2 border-bottom bg-light"><input type="text" class="form-control form-control-sm" v-model="q" placeholder="Suche in Liste..."></div>
            <div v-for="p in filtered" :key="p.id" class="d-flex align-items-center gap-3 p-3 border-bottom" :class="{ 'bg-light': !p.is_present }">
                <input type="checkbox" class="form-check-input" style="transform: scale(1.3)" v-model="p.is_present">
                <div class="name-area flex-grow-1">
                    <span class="fw-bold text-dark fs-5">{{ p.name }}</span>
                    <div class="d-flex flex-wrap gap-1 mt-2" v-if="globalVehicles.length">
                        <button v-for="v in globalVehicles" :key="v.id" @click="setVehicle(p, v.name)" :class="['vehicle-btn-select', p.vehicle === v.name ? 'active' : '']">{{ v.name }}</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav-action d-flex">
        <button class="btn btn-dark flex-fill py-2.5 fw-bold rounded-pill shadow" @click="saveAndExit">PROTOKOLL SICHERN & BEENDEN</button>
    </div>
</div>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                groupId: null, sessionId: null, globalVehicles: [], persons: [],
                category: 'Übung', duration: 2.0, description: '', instructors: '',
                currentDate: new Date().toISOString().split('T')[0], q: ''
            }
        },
        computed: {
            presentCount() { return this.persons.filter(p => p.is_present).length; },
            filtered() {
                let list = [...this.persons];
                if (this.q) list = list.filter(p => p.name.toLowerCase().includes(this.q.toLowerCase()));
                return list;
            }
        },
        async mounted() {
            const params = new URLSearchParams(window.location.search);
            this.groupId = params.get('group_id'); this.sessionId = params.get('session_id');
            
            try { this.globalVehicles = await (await fetch('/api/vehicles')).json(); } catch(e) {}
            await this.load();
        },
        methods: {
            async load() {
                if(!this.groupId) return;
                const d = await (await fetch(`/groups/${this.groupId}/attendance${this.sessionId ? '?session_id='+this.sessionId : ''}`)).json();
                if(d.persons) this.persons = d.persons;
                if(d.session_id) { this.sessionId = d.session_id; this.description = d.description; this.instructors = d.instructors; this.duration = d.duration; this.category = d.category; this.currentDate = d.date; }
            },
            setVehicle(p,v) { p.vehicle = (p.vehicle===v) ? '' : v; if(p.vehicle) p.is_present = true; },
            goBack() { window.location.href = '/'; },
            async saveAndExit() {
                const payload = {
                    session_id: this.sessionId ? parseInt(this.sessionId) : null, date: this.currentDate, group_id: parseInt(this.groupId),
                    category: this.category, duration: parseFloat(this.duration), description: this.description, instructors: this.instructors,
                    entries: this.persons.map(p => ({ person_id: p.id || p.person_id, is_present: p.is_present, vehicle: p.vehicle || "" }))
                };
                await fetch('/attendance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                this.goBack();
            }
        }
    }).mount('#app');
</script>
</body>
</html>
