<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dienstbuch Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=6.1">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>body { padding-bottom: 100px; background: #f8fafc; }</style>
</head>
<body>

<div id="app" v-cloak>
    <div class="bg-white p-3 border-bottom shadow-sm sticky-top d-flex justify-content-between align-items-center mb-4">
        <h5 class="m-0 fw-bold text-dark"><i class="fa fa-pen-nib text-danger me-2"></i>Dienstbuch schreiben</h5>
        <button class="btn btn-sm btn-outline-dark rounded-pill px-3 fw-bold" @click="goBack"><i class="fas fa-chevron-left me-1"></i> Abbrechen</button>
    </div>

    <div class="container" style="max-width: 900px;">
        <div class="card bg-white shadow-sm border-0">
            <div class="row g-3 mb-3">
                <div class="col-6"><label class="small text-muted fw-bold">Datum</label><input type="date" class="form-control" v-model="currentDate"></div>
                <div class="col-6"><label class="small text-muted fw-bold">Dauer (h)</label><input type="number" step="0.5" class="form-control" v-model="duration"></div>
            </div>
            <div class="mb-3"><label class="small text-muted fw-bold">Beschreibung</label><input type="text" class="form-control" v-model="description" placeholder="Was wurde gemacht?"></div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2 px-1">
            <h6 class="m-0 fw-bold text-dark">Mannschaftsliste ({{ presentCount }})</h6>
        </div>

        <div class="card p-0 overflow-hidden border-0 shadow-sm bg-white">
            <div v-for="p in persons" :key="p.id" class="d-flex align-items-center gap-3 p-3 border-bottom">
                <input type="checkbox" class="form-check-input" style="transform: scale(1.3)" v-model="p.is_present">
                <span class="fw-bold text-dark fs-5">{{ p.name }}</span>
            </div>
        </div>
    </div>

    <div class="fixed-bottom bg-white p-3 border-top d-flex shadow-lg" style="z-index: 1020;">
        <button class="btn btn-dark flex-fill py-2.5 fw-bold rounded-pill shadow" @click="saveAndExit">PROTOKOLL SICHERN</button>
    </div>
</div>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                groupId: null, sessionId: null, persons: [],
                category: 'Übung', duration: 2.0, description: '', instructors: '',
                currentDate: new Date().toISOString().split('T')[0]
            }
        },
        computed: {
            presentCount() { return this.persons.filter(p => p.is_present).length; }
        },
        async mounted() {
            const params = new URLSearchParams(window.location.search);
            this.groupId = params.get('group_id');
            this.sessionId = params.get('session_id');
            await this.load();
        },
        methods: {
            async load() {
                if(!this.groupId) return;
                const d = await (await fetch(`/groups/${this.groupId}/attendance${this.sessionId ? '?session_id='+this.sessionId : ''}`)).json();
                if(d.persons) this.persons = d.persons;
                if(d.session_id) { this.sessionId = d.session_id; this.description = d.description; this.duration = d.duration; this.currentDate = d.date; }
            },
            goBack() { window.location.href = '/'; },
            async saveAndExit() {
                const payload = {
                    session_id: this.sessionId ? parseInt(this.sessionId) : null, date: this.currentDate, group_id: parseInt(this.groupId),
                    category: this.category, duration: parseFloat(this.duration), description: this.description, instructors: this.instructors,
                    entries: this.persons.map(p => ({ person_id: p.id || p.person_id, is_present: p.is_present, vehicle: "", signature: null, note: "" }))
                };
                
                try {
                    const res = await fetch('/attendance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!res.ok) {
                        const err = await res.json();
                        alert("Speicherfehler: " + JSON.stringify(err));
                        return;
                    }
                    this.goBack();
                } catch (e) {
                    alert("Verbindungsfehler beim Speichern!");
                }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
