<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dienstbuch Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root { --primary-color: #b71c1c; --bg-color: #f4f6f8; --exercise: #0d6efd; --incident: #dc3545; --misc: #ffc107; }
        body { background-color: var(--bg-color); font-family: 'Segoe UI', sans-serif; padding-bottom: 120px; }
        .main-content { padding: 15px; max-width: 900px; margin: 0 auto; }
        
        .header-bar { 
            background: white; border-bottom: 3px solid var(--primary-color); 
            padding: 10px 15px; position: sticky; top: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        .btn-cat { border: 2px solid transparent; opacity: 0.5; transition: 0.3s; font-weight: bold; color: #666; }
        .btn-cat:hover { opacity: 0.8; }
        
        .btn-cat-Übung.active { background-color: var(--exercise) !important; color: white !important; opacity: 1; transform: scale(1.05); border-color: rgba(0,0,0,0.1); }
        .btn-cat-Einsatz.active { background-color: var(--incident) !important; color: white !important; opacity: 1; transform: scale(1.05); border-color: rgba(0,0,0,0.1); }
        .btn-cat-Sonstiges.active { background-color: var(--misc) !important; color: black !important; opacity: 1; transform: scale(1.05); border-color: rgba(0,0,0,0.1); }
        
        .person-row { 
            display: flex; align-items: center; padding: 12px; 
            border-bottom: 1px solid #edf2f7; transition: 0.2s;
        }
        .person-row:last-child { border-bottom: none; }
        .person-row.absent { background-color: #fff5f5; opacity: 0.8; }
        
        .name-area { flex-grow: 1; min-width: 0; }
        .name-text { font-weight: 600; font-size: 1.05rem; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .sig-box { 
            width: 70px; height: 40px; border: 1px dashed #cbd5e0; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            background: #f8fafc; overflow: hidden;
        }
        .sig-box img { max-width: 100%; max-height: 100%; }
        
        .vehicle-btn { 
            padding: 4px 8px; font-size: 0.75rem; border-radius: 6px; 
            border: 1px solid #e2e8f0; background: white; color: #64748b;
        }
        .vehicle-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        .save-indicator { position: fixed; bottom: 85px; right: 20px; z-index: 999; }
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; background: white; 
            padding: 15px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; z-index: 1000;
        }

        #sigCanvas { border: 1px solid #ccc; width: 100%; height: 250px; touch-action: none; background: white; }
        .pool-item { cursor: pointer; padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .pool-item:hover { background: #f0f7ff; }
        [v-cloak] { display: none; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="header-bar">
        <button class="btn btn-outline-secondary btn-sm" @click="goBack">
            <i class="fas fa-chevron-left"></i> Zurück
        </button>
        <h5 class="m-0 fw-bold">Dienstbuch</h5>
        <div v-if="!isAdmin">
            <button class="btn btn-outline-danger btn-sm" @click="promptAdmin">Admin</button>
        </div>
        <div v-else>
            <span class="badge bg-danger">Admin</span>
            <button class="btn btn-link btn-sm text-muted" @click="logoutAdmin">Logout</button>
        </div>
    </div>

    <div class="main-content">
        <div class="card p-3">
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="small text-muted fw-bold">DATUM</label>
                    <input type="date" class="form-control" v-model="currentDate" @change="autoSave">
                </div>
                <div class="col-6">
                    <label class="small text-muted fw-bold">DAUER (Std.)</label>
                    <input type="number" step="0.5" class="form-control" v-model="duration" @input="autoSave">
                </div>
            </div>

            <label class="small text-muted fw-bold">KATEGORIE</label>
            <div class="d-flex gap-2 mb-3">
                <button v-for="cat in ['Übung', 'Einsatz', 'Sonstiges']" 
                        :key="cat"
                        @click="setCat(cat)"
                        :class="['btn', 'flex-fill', 'btn-cat', 'btn-cat-' + cat, category === cat ? 'active' : 'bg-light']">
                    {{cat}}
                </button>
            </div>

            <div class="mb-3">
                <label class="small text-muted fw-bold">THEMA / BESCHREIBUNG</label>
                <input list="topicList" class="form-control" v-model="description" @input="autoSave" placeholder="Was wurde gemacht?">
                <datalist id="topicList">
                    <option v-for="t in topicOptions" :key="t" :value="t"></option>
                </datalist>
            </div>

            <div class="mb-0">
                <label class="small text-muted fw-bold">ÜBUNGSLEITUNG / AUSBILDER</label>
                <input list="instrList" class="form-control" v-model="instructors" @input="autoSave" placeholder="Name(n)...">
                <datalist id="instrList">
                    <option v-for="i in instrOptions" :key="i" :value="i"></option>
                </datalist>
            </div>
        </div>

        <div class="card p-3 mb-3">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <span class="small text-muted fw-bold d-block">BESTÄTIGUNG ÜBUNGSLEITUNG</span>
                    <small v-if="!leaderSignature" class="text-danger">Unterschrift fehlt</small>
                    <small v-else class="text-success">Erfasst <i class="fas fa-check"></i></small>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <button v-if="leaderSignature" class="btn btn-sm btn-outline-secondary" @click="clearLeaderSig">
                        <i class="fas fa-undo"></i>
                    </button>
                    <div class="sig-box" @click="openSig('LEADER')">
                        <img v-if="leaderSignature" :src="leaderSignature">
                        <i v-else class="fas fa-pen text-muted"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center px-1 mb-2">
            <h6 class="m-0 fw-bold">Anwesenheit ({{presentCount}}/{{persons.length}})</h6>
            <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#poolModal">
                <i class="fas fa-plus"></i> Personen
            </button>
        </div>

        <div class="card overflow-hidden">
            <div class="p-2 bg-light border-bottom">
                <input type="text" class="form-control form-control-sm" v-model="q" placeholder="Suchen...">
            </div>
            
            <div v-for="p in filtered" :key="p.id || p.person_id" class="person-row" :class="{absent: !p.is_present}">
                <div class="me-3">
                    <input type="checkbox" class="form-check-input" style="transform: scale(1.3)" 
                           :checked="p.is_present" @change="togglePresence(p)">
                </div>
                
                <div class="name-area" @click="togglePresence(p)">
                    <span class="name-text">{{p.name}}</span>
                    <div class="d-flex gap-1 mt-1 overflow-auto pb-1" v-if="globalVehicles.length">
                        <button v-for="v in globalVehicles" 
                                :key="v.id"
                                @click.stop="setVehicle(p, v.name)"
                                :class="['vehicle-btn', p.vehicle === v.name ? 'active' : '']">
                            {{v.name}}
                        </button>
                    </div>
                </div>

                <div class="ms-2 d-flex align-items-center gap-2">
                    <button v-if="p.signature" class="btn btn-sm btn-link text-muted p-0" @click.stop="clearP(p)">
                        <i class="fas fa-eraser"></i>
                    </button>
                    <div class="sig-box" @click.stop="openSig(p)">
                        <img v-if="p.signature" :src="p.signature">
                        <i v-else class="fas fa-signature text-muted"></i>
                    </div>
                    <button v-if="isAdmin" class="btn btn-sm text-danger" @click.stop="removePerson(p)">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="save-indicator">
        <span v-if="saveState === 'saving'" class="badge bg-warning text-dark p-2 shadow-sm">
            <i class="fas fa-sync fa-spin me-1"></i> Speichert...
        </span>
        <span v-if="saveState === 'saved'" class="badge bg-success p-2 shadow-sm">
            <i class="fas fa-check me-1"></i> Gespeichert
        </span>
    </div>

    <div class="bottom-nav">
        <button class="btn btn-dark flex-fill py-2 fw-bold shadow" @click="saveAndExit">
            BEENDEN & SCHLIESSEN
        </button>
    </div>

    <div class="modal fade" id="poolModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Personen hinzufügen</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex gap-2 mb-3">
                        <input type="text" class="form-control" v-model="poolSearch" placeholder="Name suchen...">
                        <button class="btn btn-outline-secondary text-nowrap" @click="selectAllPool">Alle an/aus</button>
                    </div>
                    <div class="list-group list-group-flush border rounded" style="max-height: 400px; overflow-y: auto;">
                        <div v-for="p in filteredPool" :key="p.id" class="pool-item" @click="p.selected = !p.selected">
                            <input type="checkbox" class="form-check-input me-3" v-model="p.selected" @click.stop>
                            <span class="fw-semibold">{{p.name}}</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary px-4" @click="addSelectedFromPool">Hinzufügen</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="sigModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body p-3 text-center">
                    <canvas id="sigCanvas"></canvas>
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-outline-secondary flex-fill" @click="clearModal">Löschen</button>
                        <button class="btn btn-primary flex-fill" @click="saveSig">Speichern</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    let sigPad = null, sigModal = null, saveTimer = null;

    createApp({
        data() {
            return {
                isAdmin: false, groupId: null, sessionId: null,
                globalVehicles: [], persons: [], pool: [],
                topicOptions: [], instrOptions: [],
                q: '', poolSearch: '', category: 'Übung', duration: 2.0,
                description: '', instructors: '', leaderSignature: null, // Die Vue-Variable
                currentDate: new Date().toISOString().split('T')[0],
                saveState: 'idle', activeSigner: null,
                isLoading: true // Neu: Schutz gegen vorzeitiges Auto-Save
            }
        },
        computed: {
            presentCount() { return this.persons.filter(p => p.is_present).length; },
            filtered() {
                let list = [...this.persons];
                if (this.q) list = list.filter(p => p.name.toLowerCase().includes(this.q.toLowerCase()));
                return list.sort((a, b) => a.name.localeCompare(b.name));
            },
            filteredPool() {
                const s = this.poolSearch.toLowerCase();
                return this.pool.filter(p => {
                    const exists = this.persons.find(x => String(x.id || x.person_id) === String(p.id) || x.name === p.name);
                    return p.name.toLowerCase().includes(s) && !exists;
                });
            }
        },
        async mounted() {
            this.isAdmin = (localStorage.getItem('userRole') === 'admin');
            const p = new URLSearchParams(window.location.search);
            this.groupId = p.get('group_id');
            this.sessionId = p.get('session_id');
            
            try {
                const vRes = await fetch('/api/vehicles'); this.globalVehicles = await vRes.json();
            } catch(e) {}
            
            try {
                const pRes = await fetch('/api/personnel/list');
                const pData = await pRes.json();
                this.pool = pData.map(m => ({...m, selected: false}));
            } catch(e) {}

            // Erst laden, dann isLoading auf false setzen
            await this.load();
            this.isLoading = false; 
            
            try {
                const topics = await fetch(`/groups/${this.groupId}/topics`); this.topicOptions = await topics.json();
                const instrs = await fetch(`/groups/${this.groupId}/instructors`); this.instrOptions = await instrs.json();
            } catch(e) {}

            sigModal = new bootstrap.Modal(document.getElementById('sigModal'));
            sigPad = new SignaturePad(document.getElementById('sigCanvas'), { backgroundColor: 'rgb(255, 255, 255)' });
        },
        methods: {
            async load() {
                if(!this.groupId) return;
                const url = `/groups/${this.groupId}/attendance${this.sessionId ? '?session_id='+this.sessionId : ''}`;
                try {
                    const res = await fetch(url);
                    const d = await res.json();
                    
                    console.log("Geladene Daten vom Server:", d); // DEBUG-LOG

                    if(d.persons) {
                        this.persons = d.persons.map(p => ({ ...p, id: p.id || p.person_id }));
                    }

                    if(d.session_id || d.id) {
                        this.sessionId = d.session_id || d.id; 
                        this.category = d.category || 'Übung';
                        this.duration = d.duration || 2.0; 
                        this.description = d.description || '';
                        this.instructors = d.instructors || ''; 
                        this.currentDate = d.date || this.currentDate;
                        
                        // KORREKTUR: Explizite Zuweisung der Unterschrift
                        // Wir nehmen leader_signature vom Backend und speichern es in leaderSignature (Vue)
                        this.leaderSignature = d.leader_signature || d.signature || null;
                        
                        console.log("Gesetzte Unterschrift im Editor:", this.leaderSignature ? "Vorhanden" : "Leer");
                    }
                } catch(e) { console.error("Load Error", e); }
            },
            autoSave() {
                // Verhindert Speichern, während die Daten noch geladen werden oder wenn kein Admin
                if(!this.isAdmin || this.isLoading) return; 
                this.saveState = 'saving';
                clearTimeout(saveTimer);
                saveTimer = setTimeout(this.performSave, 1000);
            },
            async performSave() {
                if(!this.groupId || this.isLoading) return;
                const data = {
                    session_id: this.sessionId ? parseInt(this.sessionId) : null,
                    date: this.currentDate, 
                    group_id: parseInt(this.groupId),
                    category: this.category, 
                    duration: parseFloat(this.duration),
                    description: this.description, 
                    instructors: this.instructors,
                    leader_signature: this.leaderSignature, // Wird hier korrekt mitgeschickt
                    entries: this.persons.map(p => ({
                        person_id: p.id || p.person_id, 
                        is_present: !!p.is_present,
                        vehicle: p.vehicle || "", 
                        signature: p.signature || null, 
                        note: p.note || ""
                    }))
                };
                try {
                    const res = await fetch('/attendance', {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body:JSON.stringify(data)
                    });
                    const rd = await res.json();
                    if(rd.session_id && !this.sessionId) {
                        this.sessionId = rd.session_id;
                        window.history.replaceState({}, '', `${window.location.pathname}?group_id=${this.groupId}&session_id=${this.sessionId}`);
                    }
                    this.saveState = 'saved';
                    setTimeout(() => this.saveState = 'idle', 2000);
                } catch(e) { console.error("Save Error", e); this.saveState = 'idle'; }
            },
            // ... (Restliche Methoden: removePerson, selectAllPool, etc. bleiben gleich) ...
            removePerson(p) {
                if(confirm(p.name + " wirklich entfernen?")) {
                    const targetId = String(p.id || p.person_id);
                    this.persons = this.persons.filter(x => String(x.id || x.person_id) !== targetId);
                    this.autoSave();
                }
            },
            selectAllPool() {
                const allSelected = this.filteredPool.every(p => p.selected);
                this.filteredPool.forEach(p => p.selected = !allSelected);
            },
            async addSelectedFromPool() {
                const selected = this.pool.filter(p => p.selected);
                selected.forEach(sp => {
                    const exists = this.persons.find(x => String(x.id || x.person_id) === String(sp.id) || x.name === sp.name);
                    if(!exists) {
                        this.persons.push({ id: sp.id, name: sp.name, is_present: true, vehicle: '', signature: null });
                    }
                });
                this.pool.forEach(p => p.selected = false);
                bootstrap.Modal.getInstance(document.getElementById('poolModal')).hide();
                if(this.isAdmin) this.autoSave();
            },
            togglePresence(p) { p.is_present = !p.is_present; this.autoSave(); },
            setVehicle(p,v) { p.vehicle = (p.vehicle===v) ? '' : v; if(p.vehicle) p.is_present = true; this.autoSave(); },
            setCat(c) { this.category = c; this.autoSave(); },
            openSig(t) { 
                this.activeSigner = t; 
                sigModal.show(); 
                setTimeout(() => {
                    const c = document.getElementById('sigCanvas');
                    c.width = c.offsetWidth; c.height = c.offsetHeight; 
                    sigPad.clear();
                    if(t !== 'LEADER' && t.signature) {
                        sigPad.fromDataURL(t.signature);
                    } else if (t === 'LEADER' && this.leaderSignature) {
                        sigPad.fromDataURL(this.leaderSignature);
                    }
                }, 200); 
            },
            saveSig() {
                if(!sigPad.isEmpty()) {
                    const data = sigPad.toDataURL();
                    if(this.activeSigner === 'LEADER') {
                        this.leaderSignature = data;
                    } else { 
                        this.activeSigner.signature = data; 
                        this.activeSigner.is_present = true; 
                    }
                    this.autoSave();
                }
                sigModal.hide(); 
            },
            clearModal() { sigPad.clear(); },
            clearLeaderSig() { this.leaderSignature = null; this.autoSave(); },
            clearP(p) { p.signature = null; this.autoSave(); },
            goBack() { window.location.href = '/static/dashboard.html'; },
            saveAndExit() { this.performSave().then(() => this.goBack()); },
            async promptAdmin() {
                const p = prompt("PIN:");
                if (!p) return;
                try {
                    const res = await fetch('/api/verify_admin', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pin: p })
                    });
                    if (res.ok) {
                        this.isAdmin = true;
                        localStorage.setItem('userRole', 'admin');
                        location.reload();
                    } else {
                        alert("PIN falsch!");
                    }
                } catch (e) {
                    alert("Verbindung zum Server fehlgeschlagen.");
                }
            },
            logoutAdmin() { localStorage.setItem('userRole', 'user'); location.reload(); }
        }
    }).mount('#app');
</script>
</body>
</html>
