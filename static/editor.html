<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeuerwehrHub - Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=2.30">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
</head>
<body>
<div id="app" v-cloak>
    <header class="page-header py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-light btn-sm rounded-pill fw-bold" @click="goBack"><i class="fa fa-chevron-left me-1"></i> Zurück</button>
            <h4 class="m-0 fw-black text-white">DIENSTBUCH PROTOKOLL</h4>
            <span class="badge bg-danger text-uppercase">{{ role }}</span>
        </div>
    </header>

    <div class="container" style="max-width: 900px; padding-bottom: 100px;">
        <div class="card">
            <div class="row g-2 mb-3">
                <div class="col-6"><label class="small text-muted fw-bold mb-1">DATUM</label><input type="date" class="form-control border-0 bg-light rounded-3" v-model="currentDate"></div>
                <div class="col-6"><label class="small text-muted fw-bold mb-1">DAUER (Std.)</label><input type="number" step="0.5" class="form-control border-0 bg-light rounded-3" v-model="duration"></div>
            </div>
            <div class="mb-3"><label class="small text-muted fw-bold mb-1">THEMA / BESCHREIBUNG</label><input type="text" class="form-control border-0 bg-light rounded-3" v-model="description" placeholder="Ausbildungsinhalt..."></div>
            <div class="mb-0"><label class="small text-muted fw-bold mb-1">AUSBILDER</label><input type="text" class="form-control border-0 bg-light rounded-3" v-model="instructors" placeholder="Name..."></div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3 mt-4">
            <h5 class="fw-bold text-dark m-0">Anwesenheitsliste ({{ presentCount }})</h5>
            <button class="btn btn-sm btn-primary rounded-pill fw-bold" data-bs-toggle="modal" data-bs-target="#poolModal"><i class="fa fa-plus me-1"></i> Mannschaft laden</button>
        </div>

        <!-- Einheitliches Grid ohne Überlappung -->
        <div class="card p-0 overflow-hidden">
            <div v-for="p in persons" :key="p.id" class="person-row" :class="{'g26-expired-alert': p.g26_expired}">
                <div class="d-flex align-items-center gap-3">
                    <input type="checkbox" class="form-check-input" v-model="p.is_present" style="transform: scale(1.2)">
                    <!-- Fehlerbehebung: Mapping auf korrekte ID für Avatare -->
                    <div class="editor-avatar shadow-sm">
                        <img :src="p.has_picture ? '/api/personnel/avatar/' + (p.personnel_id || p.id) + '?v=' + cacheBuster : 'https://via.placeholder.com/150?text=FF'">
                    </div>
                    <div class="name-area">
                        <span class="name-text">{{ p.name }}</span>
                        <span v-if="p.g26_expired" class="g26-crit-text"><i class="fa fa-triangle-exclamation me-1"></i> Atemschutzverbot (G26 fällig!)</span>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <div class="sig-box shadow-sm" @click="openSig(p)">
                        <img v-if="p.signature" :src="p.signature">
                        <i v-else class="fas fa-signature text-muted"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Schließen-Leiste am Fußende -->
    <div class="bg-white p-3 border-top position-fixed bottom-0 start-0 end-0 d-flex shadow-lg" style="z-index: 1000;">
        <button class="btn btn-dark flex-fill py-2.5 fw-bold rounded-pill shadow-sm" @click="saveAndExit">PROTOKOLL SPEICHERN & BEENDEN</button>
    </div>

    <!-- MODAL FÜR MITGLIEDERPOOL -->
    <div class="modal fade" id="poolModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold">Mannschaft nachnominieren</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body overflow-y-auto" style="max-height: 350px;">
                    <div v-for="m in pool" :key="m.id" class="p-2 border-bottom d-flex align-items-center gap-2" @click="m.selected = !m.selected" style="cursor:pointer;">
                        <input type="checkbox" v-model="m.selected" @click.stop>
                        <span class="fw-semibold text-dark">{{ m.name }}</span>
                    </div>
                </div>
                <div class="modal-footer"><button class="btn btn-danger rounded-pill fw-bold px-4" @click="addSelectedFromPool">In Liste übernehmen</button></div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() { return { role: 'user', groupId: null, sessionId: null, persons: [], pool: [], currentDate: new Date().toISOString().split('T')[0], duration: 2.0, description: '', instructors: '', cacheBuster: Date.now() } },
        computed: { presentCount() { return this.persons.filter(p => p.is_present).length; } },
        async mounted() {
            const params = new URLSearchParams(window.location.search);
            this.groupId = params.get('group_id'); this.sessionId = params.get('session_id');
            const auth = await (await fetch('/api/auth/me')).json(); this.role = auth.role;
            
            this.pool = (await (await fetch('/api/personnel/list')).json()).map(x => ({...x, selected: false}));
            await this.load();
        },
        methods: {
            async load() {
                const d = await (await fetch(`/groups/${this.groupId}/attendance${this.sessionId ? '?session_id='+this.sessionId : ''}`)).json();
                if(d.persons) this.persons = d.persons;
                if(d.session_id) { this.description = d.description; this.instructors = d.instructors; this.duration = d.duration; this.currentDate = d.date; }
            },
            async saveAndExit() {
                const payload = { session_id: this.sessionId ? parseInt(this.sessionId) : null, date: this.currentDate, group_id: parseInt(this.groupId), category: 'Übung', duration: parseFloat(this.duration), description: this.description, instructors: this.instructors, entries: this.persons.map(p => ({ person_id: p.id, is_present: p.is_present, vehicle: p.vehicle, signature: p.signature, note: p.note })) };
                await fetch('/attendance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                this.goBack();
            },
            addSelectedFromPool() {
                this.pool.filter(x => x.selected).forEach(m => {
                    if(!this.persons.find(p => p.id === m.id)) this.persons.push({ id: m.id, name: m.name, is_present: true, personnel_id: m.id, has_picture: m.has_picture, g26_expired: m.g26_expired });
                });
                bootstrap.Modal.getInstance(document.getElementById('poolModal')).hide();
            },
            goBack() { window.location.href = '/dashboard'; }
        }
    }).mount('#app');
</script>
</body>
</html>
