<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeuerwehrHub - Dienstbuch Protokollführung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=5.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { padding-bottom: 120px; }
        .vehicle-btn-select { padding: 4px 10px; font-size: 0.75rem; border-radius: 6px; border: 1px solid var(--fh-border); background: #ffffff; color: var(--fh-text-muted); font-weight: bold; }
        .vehicle-btn-select.active { background: var(--fh-fire) !important; color: white !important; border-color: var(--fh-fire); }
        .qual-filter-pill { font-size: 0.8rem; font-weight: 700; border: 2px solid var(--fh-border); background: white; color: var(--fh-text-muted); border-radius: 20px; padding: 5px 14px; cursor: pointer; transition: 0.15s; }
        .qual-filter-pill.active { background: var(--fh-fire); color: white; border-color: var(--fh-fire); }
        .bottom-nav-action { position: fixed; bottom: 0; left: 0; right: 0; background: #ffffff; padding: 15px; border-top: 2px solid var(--fh-border); display: flex; gap: 10px; z-index: 1020; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .btn-cat { border: 2px solid var(--fh-border); color: var(--fh-text-muted); font-weight: bold; transition: 0.2s; }
        .btn-cat-Übung.active { background-color: var(--fh-exercise) !important; color: white !important; }
        .btn-cat-Einsatz.active { background-color: var(--fh-fire) !important; color: white !important; }
        .btn-cat-Sonstiges.active { background-color: var(--fh-warn) !important; color: white !important; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="sidebar-header bg-light d-flex justify-content-between p-3 border-bottom shadow-sm sticky-top">
        <h5 class="m-0 fw-bold text-dark"><i class="fa fa-pen-nib text-danger me-2"></i>Dienstbuch Editor</h5>
        <button class="btn btn-sm btn-outline-dark rounded-pill px-3 fw-bold" @click="goBack"><i class="fas fa-chevron-left me-1"></i> Abbrechen</button>
    </div>

    <div class="main-content" style="max-width: 950px; margin: 0 auto;">
        <div class="card bg-white">
            <div class="row g-3 mb-3">
                <div class="col-6"><label class="small text-muted fw-bold mb-1">DATUM</label><input type="date" class="form-control" v-model="currentDate" @change="autoSave"></div>
                <div class="col-6"><label class="small text-muted fw-bold mb-1">DAUER (STD)</label><input type="number" step="0.5" class="form-control" v-model="duration" @input="autoSave"></div>
            </div>
            <label class="small text-muted fw-bold mb-1">DIENST-KATEGORIE</label>
            <div class="d-flex gap-2 mb-3">
                <button v-for="cat in ['Übung', 'Einsatz', 'Sonstiges']" :key="cat" @click="setCat(cat)" :class="['btn', 'flex-fill', 'btn-cat', 'btn-cat-' + cat, category === cat ? 'active' : '']">{{cat}}</button>
            </div>
            <div class="mb-3"><label class="small text-muted fw-bold mb-1">THEMA / BESCHREIBUNG</label><input type="text" class="form-control" v-model="description" @input="autoSave" placeholder="Was wurde gemacht?"></div>
            <div><label class="small text-muted fw-bold mb-1">ÜBUNGSLEITUNG</label><input type="text" class="form-control" v-model="instructors" @input="autoSave" placeholder="Ausbilder eintragen..."></div>
        </div>

        <div class="card bg-white">
            <div class="d-flex justify-content-between align-items-center">
                <div><span class="small text-muted fw-bold d-block">GEGENZEICHNUNG LEITUNG</span><small v-if="!leaderSignature" class="text-danger fw-bold">Unterschrift fehlt</small><small v-else class="text-success fw-bold">Erfasst <i class="fas fa-check"></i></small></div>
                <div class="d-flex align-items-center gap-2">
                    <button v-if="leaderSignature" class="btn btn-sm btn-outline-secondary rounded-circle" @click="clearLeaderSig"><i class="fas fa-undo"></i></button>
                    <div class="sig-box shadow-sm" @click="openSig('LEADER')"><img v-if="leaderSignature" :src="leaderSignature"><i v-else class="fas fa-pen text-muted"></i></div>
                </div>
            </div>
        </div>

        <div class="card p-2 bg-light border-secondary mb-3">
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <span class="small text-muted fw-bold text-uppercase me-1"><i class="fa fa-filter text-danger"></i> Filter:</span>
                <span class="qual-filter-pill" :class="{active: activeQualFilter === ''}" @click="activeQualFilter = ''">Alle Kameraden</span>
                <span class="qual-filter-pill" :class="{active: activeQualFilter === 'is_agt'}" @click="activeQualFilter = 'is_agt'"><i class="fa fa-mask-ventilator me-1"></i> Atemschutz (AGT)</span>
                <span class="qual-filter-pill" :class="{active: activeQualFilter === 'is_maschinist'}" @click="activeQualFilter = 'is_maschinist'"><i class="fa fa-truck-monster me-1"></i> Maschinisten</span>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2 px-1">
            <h6 class="m-0 fw-bold text-dark">Mannschaftsliste (Anwesend: {{ presentCount }})</h6>
            <button class="btn btn-sm btn-danger rounded-pill px-3 fw-bold shadow-sm" @click="autoSave" data-bs-toggle="modal" data-bs-target="#poolModal"><i class="fa fa-plus me-1"></i> Personen hinzufügen</button>
        </div>

        <div class="card p-0 overflow-hidden border-2 bg-white">
            <div class="p-2 border-bottom bg-light"><input type="text" class="form-control form-control-sm" v-model="q" placeholder="Suche in Liste..."></div>
            <div v-for="p in filtered" :key="p.id" class="person-row border-secondary" :class="{absent: !p.is_present, 'g26-expired-alert': p.g26_expired}">
                <div class="d-flex align-items-center gap-3 flex-grow-1">
                    <input type="checkbox" class="form-check-input border-secondary" style="transform: scale(1.3)" v-model="p.is_present" @change="autoSave">
                    <div class="editor-avatar shadow-sm border-secondary"><img :src="p.has_picture ? '/api/personnel/avatar/' + p.personnel_id + '?v=' + cacheBuster : 'https://via.placeholder.com/150?text=FF'"></div>
                    <div class="name-area">
                        <span class="fw-bold text-dark fs-5">{{ p.name }}</span>
                        <span v-if="p.g26_expired" class="g26-crit-text"><i class="fa fa-triangle-exclamation me-1"></i> G26.3 abgelaufen! Atemschutzverbot!</span>
                        <div class="d-flex flex-wrap gap-1 mt-2" v-if="globalVehicles.length">
                            <button v-for="v in globalVehicles" :key="v.id" @click.stop="setVehicle(p, v.name)" :class="['vehicle-btn-select', p.vehicle === v.name ? 'active' : '']">{{ v.name }}</button>
                        </div>
                    </div>
                </div>
                <div class="ms-2 d-flex align-items-center gap-2 flex-shrink-0">
                    <button v-if="p.signature" class="btn btn-sm text-muted p-1 border-0 bg-transparent" @click.stop="clearP(p)"><i class="fas fa-eraser"></i></button>
                    <div class="sig-box shadow-sm border-secondary" @click.stop="openSig(p)"><img v-if="p.signature" :src="p.signature"><i v-else class="fas fa-signature text-muted"></i></div>
                    <button class="btn btn-sm text-danger p-1 border-0 bg-transparent" @click.stop="removePerson(p)"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav-action">
        <button class="btn btn-dark flex-fill py-2.5 fw-bold rounded-pill shadow" @click="saveAndExit">PROTOKOLL SICHERN & BEENDEN</button>
    </div>

    <div class="modal fade" id="poolModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-white border-secondary shadow-lg">
                <div class="modal-header bg-light border-bottom border-secondary py-3"><h5 class="modal-title fw-bold text-dark">Kameraden zuteilen</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body overflow-y-auto" style="max-height: 350px;">
                    <div class="d-flex gap-2 mb-3">
                        <input type="text" class="form-control" v-model="poolSearch" placeholder="Name suchen...">
                        <button class="btn btn-outline-dark btn-sm rounded-3 text-nowrap fw-bold" @click="selectAllPool">Alle toggeln</button>
                    </div>
                    <div v-for="m in filteredPool" :key="m.id" class="p-2 border-bottom border-secondary d-flex align-items-center gap-2" @click="m.selected = !m.selected" style="cursor:pointer;">
                        <input type="checkbox" v-model="m.selected" @click.stop>
                        <span class="fw-semibold text-dark">{{ m.name }}</span>
                    </div>
                </div>
                <div class="modal-footer border-0"><button class="btn btn-danger rounded-pill fw-bold px-4" @click="addSelectedFromPool">In Liste übernehmen</button></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="sigModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-white text-dark rounded-4">
                <div class="modal-body p-4 text-center">
                    <div class="sig-wrapper mb-3 border"><canvas id="sigCanvas"></canvas></div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary flex-fill rounded-pill" @click="clearModal">Löschen</button>
                        <button class="btn btn-danger flex-fill rounded-pill fw-bold shadow-sm" @click="saveSig">Speichern</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    let sigPad = null, sigModal = null, saveTimer = null;

    createApp({
        data() {
            return {
                groupId: null, sessionId: null, globalVehicles: [], persons: [], pool: [],
                category: 'Übung', duration: 2.0, description: '', instructors: '', activeQualFilter: '',
                currentDate: new Date().toISOString().split('T')[0], activeSigner: null, leaderSignature: null,
                q: '', poolSearch: '', cacheBuster: Date.now()
            }
        },
        computed: {
            presentCount() { return this.persons.filter(p => p.is_present).length; },
            filtered() {
                let list = [...this.persons];
                if (this.q) list = list.filter(p => p.name.toLowerCase().includes(this.q.toLowerCase()));
                if (this.activeQualFilter) list = list.filter(p => p[this.activeQualFilter] === true || p[this.activeQualFilter] === 1);
                return list.sort((a, b) => a.name.localeCompare(b.name));
            },
            filteredPool() {
                const s = this.poolSearch.toLowerCase();
                return this.pool.filter(p => {
                    const exists = this.persons.find(x => String(x.id || x.person_id) === String(p.id) || x.name === p.name);
                    return p.name.toLowerCase().includes(s) && !exists;
                });
            }
        },
        async mounted() {
            const params = new URLSearchParams(window.location.search);
            this.groupId = params.get('group_id'); this.sessionId = params.get('session_id');
            
            try { this.globalVehicles = await (await fetch('/api/vehicles')).json(); } catch(e) {}
            try { this.pool = (await (await fetch('/api/personnel/list')).json()).map(m => ({...m, selected: false})); } catch(e) {}
            await this.load();
            
            sigModal = new bootstrap.Modal(document.getElementById('sigModal'));
            sigPad = new SignaturePad(document.getElementById('sigCanvas'), { backgroundColor: 'rgb(255, 255, 255)' });
        },
        methods: {
            async load() {
                if(!this.groupId) return;
                const d = await (await fetch(`/groups/${this.groupId}/attendance${this.sessionId ? '?session_id='+this.sessionId : ''}`)).json();
                if(d.persons) this.persons = d.persons;
                if(d.session_id) { this.sessionId = d.session_id; this.description = d.description; this.instructors = d.instructors; this.duration = d.duration; this.category = d.category; this.currentDate = d.date; this.leaderSignature = d.leader_signature; }
            },
            autoSave() { clearTimeout(saveTimer); saveTimer = setTimeout(this.performSave, 1000); },
            async performSave() {
                if(!this.groupId) return;
                const data = {
                    session_id: this.sessionId ? parseInt(this.sessionId) : null, date: this.currentDate, group_id: parseInt(this.groupId),
                    category: this.category, duration: parseFloat(this.duration), description: this.description, instructors: this.instructors, leader_signature: this.leaderSignature,
                    entries: this.persons.map(p => ({ person_id: p.id || p.person_id, is_present: p.is_present, vehicle: p.vehicle || "", signature: p.signature || null, note: p.note || "" }))
                };
                const rd = await (await fetch('/attendance', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) })).json();
                if(rd.session_id && !this.sessionId) { this.sessionId = rd.session_id; window.history.replaceState({}, '', `${window.location.pathname}?group_id=${this.groupId}&session_id=${this.sessionId}`); }
            },
            togglePresence(p) { p.is_present = !p.is_present; this.autoSave(); },
            setVehicle(p,v) { p.vehicle = (p.vehicle===v) ? '' : v; if(p.vehicle) p.is_present = true; this.autoSave(); },
            setCat(c) { this.category = c; this.autoSave(); },
            removePerson(p) { if(confirm("Entfernen?")) { this.persons = this.persons.filter(x => x.id !== p.id); this.autoSave(); } },
            selectAllPool() { const allSelected = this.filteredPool.every(p => p.selected); this.filteredPool.forEach(p => p.selected = !allSelected); },
            addSelectedFromPool() {
                this.pool.filter(x => x.selected).forEach(m => {
                    if(!this.persons.find(p => p.id === m.id)) this.persons.push({ id: m.id, name: m.name, is_present: true, vehicle: '', signature: null, personnel_id: m.id, has_picture: m.has_picture, g26_expired: m.g26_expired });
                });
                this.pool.forEach(p => p.selected = false); bootstrap.Modal.getInstance(document.getElementById('poolModal')).hide(); this.autoSave();
            },
            openSig(t) { this.activeSigner = t; sigModal.show(); setTimeout(() => { const c = document.getElementById('sigCanvas'); c.width = c.offsetWidth; c.height = c.offsetHeight; sigPad.clear(); if(t !== 'LEADER' && t.signature) { sigPad.fromDataURL(t.signature); } else if (t === 'LEADER' && this.leaderSignature) { sigPad.fromDataURL(this.leaderSignature); } }, 200); },
            saveSig() { if(!sigPad.isEmpty()) { if(this.activeSigner === 'LEADER') { this.leaderSignature = sigPad.toDataURL(); } else { this.activeSigner.signature = sigPad.toDataURL(); this.activeSigner.is_present = true; } this.autoSave(); } sigModal.hide(); },
            clearModal() { sigPad.clear(); },
            clearLeaderSig() { this.leaderSignature = null; this.autoSave(); },
            clearP(p) { p.signature = null; this.autoSave(); },
            goBack() { window.location.href = '/'; },
            async saveAndExit() { await this.performSave(); this.goBack(); }
        }
    }).mount('#app');
</script>
</body>
</html>
