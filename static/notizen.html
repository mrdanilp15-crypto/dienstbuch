<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funkraum - Notizen & Mängelmeldungen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root { 
            --dark: #0f172a; --bg: #f8fafc; --fire: #ef4444;
            --public-color: #10b981; --private-color: #3b82f6; --gw-color: #f59e0b;
        }
        body { background: var(--bg); font-family: 'Inter', system-ui, sans-serif; color: var(--dark); }
        .page-header { background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%); color: white; padding: 2rem 0; border-radius: 0 0 24px 24px; margin-bottom: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .filter-pill { font-weight: 600; font-size: 0.85rem; border-radius: 20px; padding: 6px 16px; border: 1px solid #e2e8f0; background: white; color: #64748b; transition: 0.2s; }
        .filter-pill.active { background: var(--dark) !important; color: white !important; border-color: var(--dark); }
        
        .note-card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; padding: 1.5rem; transition: 0.2s; position: relative; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .note-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.05); transform: translateY(-2px); }
        
        .badge-vis { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; padding: 4px 10px; border-radius: 50px; }
        .vis-public { background: #e6f4ea; color: #137333; }
        .vis-private { background: #e8f0fe; color: #1a73e8; }
        .vis-admin { background: #fce8e6; color: #c5221f; }
        .vis-geratewart { background: #fef7e0; color: #b06000; border: 1px solid #fad2cf; }

        .btn-send-gw { background: var(--gw-color); color: white; font-weight: bold; }
        .btn-send-gw:hover { background: #d97706; color: white; }
        [v-cloak] { display: none !important; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <header class="page-header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <h2 class="fw-black m-0"><i class="fa fa-sticky-note me-3 text-warning"></i>Notizen & Meldungen</h2>
                <a href="/dashboard" class="btn btn-light btn-sm rounded-pill px-4 fw-bold">Dashboard</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="row g-4">
            
            <!-- LINKER BEREICH: DYNAMISCHES FORMULAR (CREATE / EDIT MOEGLICH) -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 p-4 sticky-top" style="top: 20px; z-index: 10;">
                    <h5 class="fw-bold mb-3 text-dark">
                        <i class="fa fa-pen-to-square me-2 text-secondary"></i>
                        {{ editingId ? 'Eintrag bearbeiten' : 'Eintrag verfassen' }}
                    </h5>
                    
                    <form @submit.prevent="saveNote">
                        <div class="mb-3">
                            <label class="small fw-bold text-muted mb-1">Betreff / Titel</label>
                            <input type="text" v-model="newNote.title" class="form-control border-0 bg-light rounded-3" placeholder="z.B. Defekt an HLF Geräteraum 3" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="small fw-bold text-muted mb-1">Inhalt / Schadensbeschreibung</label>
                            <textarea v-model="newNote.content" class="form-control border-0 bg-light rounded-3" rows="5" placeholder="Beschreibe die Notiz oder den Defekt so genau wie möglich..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="small fw-bold text-muted mb-2 d-block">Sichtbarkeits-Kategorie</label>
                            
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" id="r-private" value="private" v-model="newNote.visibility">
                                <label class="form-check-label small fw-bold text-secondary" for="r-private">
                                    <i class="fa fa-lock me-2 text-primary"></i>Privat (Nur für mich sichtbar)
                                </label>
                            </div>
                            
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" id="r-public" value="public" v-model="newNote.visibility">
                                <label class="form-check-label small fw-bold text-secondary" for="r-public">
                                    <i class="fa fa-users me-2 text-success"></i>Öffentlich (Für alle am Whiteboard)
                                </label>
                            </div>

                            <div class="form-check mb-2" v-if="currentUser.role === 'admin'">
                                <input class="form-check-input" type="radio" id="r-admin" value="admin" v-model="newNote.visibility">
                                <label class="form-check-label small fw-bold text-danger" for="r-admin">
                                    <i class="fa fa-user-shield me-2"></i>Nur für Admins sichtbar
                                </label>
                            </div>

                            <div class="form-check mb-0">
                                <input class="form-check-input" type="radio" id="r-gw" value="geratewart" v-model="newNote.visibility">
                                <label class="form-check-label small fw-bold text-warning" for="r-gw">
                                    <i class="fa fa-wrench me-2"></i>Meldung an Gerätewart (Technischer Defekt)
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button v-if="editingId" type="button" class="btn btn-secondary rounded-3 fw-bold flex-fill" @click="cancelEdit">
                                Abbrechen
                            </button>
                            <button type="submit" :class="['btn rounded-3 fw-bold py-2 shadow-sm flex-fill', newNote.visibility === 'geratewart' ? 'btn-send-gw' : 'btn-danger']">
                                <i class="fa fa-save me-2"></i>{{ editingId ? 'Speichern' : 'Veröffentlichen' }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- RECHTER BEREICH: PINNWAND / FILTERBARE LISTE -->
            <div class="col-lg-8">
                
                <div class="d-flex flex-wrap gap-2 mb-4">
                    <button class="filter-pill shadow-sm" :class="{active: activeFilter === 'all'}" @click="activeFilter = 'all'">Alle Einträge</button>
                    <button class="filter-pill shadow-sm" :class="{active: activeFilter === 'private'}" @click="activeFilter = 'private'"><i class="fa fa-lock me-1"></i>Meine Privaten</button>
                    <button class="filter-pill shadow-sm" :class="{active: activeFilter === 'public'}" @click="activeFilter = 'public'"><i class="fa fa-users me-1"></i>Öffentliche Pinnwand</button>
                    <button class="filter-pill shadow-sm" :class="{active: activeFilter === 'geratewart'}" @click="activeFilter = 'geratewart'"><i class="fa fa-wrench me-1"></i>Gerätewart-Meldungen</button>
                    <button v-if="currentUser.role === 'admin'" class="filter-pill shadow-sm text-danger" :class="{active: activeFilter === 'admin'}" @click="activeFilter = 'admin'"><i class="fa fa-user-shield me-1"></i>Admin-Intern</button>
                </div>

                <div class="row g-3">
                    <div class="col-12" v-for="n in filteredNotes" :key="n.id">
                        <div class="note-card" :style="editingId === n.id ? 'border-color: var(--fire); background-color: #fff8f8;' : ''">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div>
                                    <span :class="['badge-vis me-2', 'vis-' + n.visibility]">{{ getVisLabel(n.visibility) }}</span>
                                    <small class="text-muted font-monospace">{{ n.date_formatted }} Uhr — von <b>{{ n.username }}</b></small>
                                </div>
                                <div class="d-flex gap-1">
                                    <!-- Bearbeiten Button: Nur sichtbar wenn man selbst der Autor ist -->
                                    <button v-if="n.username === currentUser.username" class="btn btn-sm btn-outline-light text-muted border-0 rounded-circle" @click="startEdit(n)" title="Inhalt korrigieren/bearbeiten">
                                        <i class="fa fa-edit text-primary"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-light text-muted border-0 rounded-circle" @click="deleteNote(n.id)" title="Löschen">
                                        <i class="fa fa-trash-alt text-danger"></i>
                                    </button>
                                </div>
                            </div>
                            <h5 class="fw-bold text-dark mb-2">{{ n.title }}</h5>
                            <p class="text-secondary m-0 white-space-pre-line" style="white-space: pre-wrap;">{{ n.content }}</p>
                        </div>
                    </div>

                    <div v-if="filteredNotes.length === 0" class="col-12 text-center text-muted py-5 border rounded-4 bg-white">
                        <i class="fa fa-folder-open h1 d-block mb-2 opacity-25"></i>
                        Keine Notizen oder Mängelmeldungen in dieser Kategorie vorhanden.
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                currentUser: { username: '', role: '' },
                notes: [],
                activeFilter: 'all',
                editingId: null, // Trackt ob und welche Notiz gerade geändert wird
                newNote: { title: '', content: '', visibility: 'private' }
            }
        },
        computed: {
            filteredNotes() {
                if (this.activeFilter === 'all') return this.notes;
                return this.notes.filter(n => n.visibility === this.activeFilter);
            }
        },
        async mounted() {
            try {
                const authRes = await fetch('/api/auth/me', { credentials: 'include' });
                if (!authRes.ok) { window.location.href = '/'; return; }
                this.currentUser = await authRes.json();
            } catch (e) { window.location.href = '/'; return; }

            await this.loadNotes();
        },
        methods: {
            async loadNotes() {
                try {
                    const res = await fetch('/api/notes', { credentials: 'include' });
                    if (res.ok) { this.notes = await res.json(); }
                } catch (e) { console.error("Fehler beim Laden", e); }
            },
            async saveNote() {
                try {
                    // Schaltet dynamisch zwischen PUT (Editieren) und POST (Neu erstellen) um
                    const isEdit = this.editingId !== null;
                    const url = isEdit ? `/api/notes/${this.editingId}` : '/api/notes';
                    const method = isEdit ? 'PUT' : 'POST';

                    const res = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify(this.newNote)
                    });

                    if (res.ok) {
                        this.newNote.title = '';
                        this.newNote.content = '';
                        this.editingId = null;
                        await this.loadNotes();
                    } else {
                        alert("Eintrag konnte nicht gespeichert werden.");
                    }
                } catch (e) { alert("Serverfehler beim Senden."); }
            },
            startEdit(note) {
                // Kopiert die Werte der Karte direkt zurück in die linke Eingabemaske
                this.editingId = note.id;
                this.newNote.title = note.title;
                this.newNote.content = note.content;
                this.newNote.visibility = note.visibility;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },
            cancelEdit() {
                this.editingId = null;
                this.newNote.title = '';
                this.newNote.content = '';
                this.newNote.visibility = 'private';
            },
            async deleteNote(id) {
                if (confirm("Möchtest du diesen Eintrag permanent löschen?")) {
                    try {
                        const res = await fetch(`/api/notes/${id}`, { method: 'DELETE', credentials: 'include' });
                        if (res.ok) { 
                            if (this.editingId === id) this.cancelEdit();
                            await this.loadNotes(); 
                        } else { 
                            alert("Löschen fehlgeschlagen (Fehlende Berechtigung)."); 
                        }
                    } catch (e) { alert("Verbindungsfehler."); }
                }
            },
            getVisLabel(vis) {
                if (vis === 'public') return 'Öffentlich';
                if (vis === 'private') return 'Privat';
                if (vis === 'admin') return 'Admin Intern';
                if (vis === 'geratewart') return '⚠️ Mangel an Gerätewart';
                return vis;
            }
        }
    }).mount('#app');
</script>
</body>
</html>
