<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeuerwehrHub - Technikboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=4.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
<div id="app" v-cloak>
    <nav class="navbar-top">
        <div class="navbar-brand-row">
            <div class="brand-left"><div class="brand-logo"><i class="fa fa-wrench"></i></div><div class="brand-title">Mängel- & Geräteboard</div></div>
            <div class="brand-right"><a href="/" class="btn btn-sm btn-outline-light rounded-pill px-4 fw-bold">Zum Cockpit</a></div>
        </div>
    </nav>

    <div class="main-content">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-secondary bg-white" style="position: sticky; top: 20px;">
                    <h5 class="fw-bold text-dark mb-3"><i class="fa fa-edit text-danger me-2"></i>Defekt melden</h5>
                    <form @submit.prevent="saveNote">
                        <div class="mb-3">
                            <label class="small fw-bold text-muted mb-1">Gerät / Fahrzeug / Armatur</label>
                            <input type="text" v-model="newNote.title" class="form-control rounded-3" placeholder="z.B. Tragkraftspritze startet schwer" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold text-muted mb-1">Genaue Fehlerbeschreibung</label>
                            <textarea v-model="newNote.content" class="form-control rounded-3" rows="5" placeholder="Details..." required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold text-muted mb-1">Prioritätsstufe</label>
                            <select v-model="newNote.priority" class="form-select rounded-3">
                                <option value="normal">Normaler Mangel (Fahrzeug fahrbereit)</option>
                                <option value="kritisch">🚨 KRITISCH (Teilausfall / Atemschutz gefährdet)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 rounded-pill fw-bold py-2.5 text-uppercase shadow-sm" style="background:var(--fh-fire);">Schadensmeldung absetzen</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="kanban-board">
                    <div class="kanban-col shadow-sm">
                        <div class="kanban-col-title text-danger"><i class="fa fa-circle-exclamation me-1"></i> Neu erfasst</div>
                        <div v-for="n in notes.filter(x => x.kanban_status === 'neu')" :key="n.id" class="card p-3 mb-2 border-secondary bg-white">
                            <div class="d-flex justify-content-between mb-1"><span class="badge" :class="n.priority === 'kritisch' ? 'bg-danger' : 'bg-secondary'">{{ n.priority.toUpperCase() }}</span><small class="text-muted font-monospace">{{ n.username }}</small></div>
                            <h5 class="fw-bold text-dark m-0 mt-2">{{ n.title }}</h5>
                            <p class="text-muted m-0 mt-1 small" style="line-height:1.3">{{ n.content }}</p>
                            <div class="d-flex gap-1 mt-3 justify-content-end">
                                <button class="btn btn-xs btn-outline-dark fw-bold rounded py-1 px-2" style="font-size:0.75rem;" @click="moveKanban(n.id, 'arbeit')">➔ In Werkstatt</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="kanban-col shadow-sm">
                        <div class="kanban-col-title text-warning"><i class="fa fa-screwdriver-wrench me-1"></i> In Reparatur</div>
                        <div v-for="n in notes.filter(x => x.kanban_status === 'arbeit')" :key="n.id" class="card p-3 mb-2 border-secondary bg-white">
                            <h5 class="fw-bold text-dark m-0">{{ n.title }}</h5>
                            <p class="text-muted m-0 mt-1 small">{{ n.content }}</p>
                            <div class="d-flex gap-1 mt-3 justify-content-end">
                                <button class="btn btn-xs btn-success text-white fw-bold rounded py-1 px-2" style="font-size:0.75rem;" @click="moveKanban(n.id, 'erledigt')">➔ Behoben</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="kanban-col shadow-sm">
                        <div class="kanban-col-title text-success"><i class="fa fa-circle-check me-1"></i> Erledigt</div>
                        <div v-for="n in notes.filter(x => x.kanban_status === 'erledigt')" :key="n.id" class="card p-3 mb-2 border-secondary bg-white opacity-75">
                            <h5 class="fw-bold text-dark m-0 text-decoration-line-through">{{ n.title }}</h5>
                            <p class="small text-muted m-0 mt-1">{{ n.content }}</p>
                            <div class="text-end mt-2"><button class="btn btn-link text-danger border-0 bg-transparent p-0 text-decoration-none small fw-bold" @click="deleteNotePermanently(n.id)"><i class="fa fa-trash-alt me-1"></i> Löschen</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() { return { notes: [], newNote: { title: '', content: '', visibility: 'public', priority: 'normal' } } },
        async mounted() { await this.loadNotes(); },
        methods: {
            async loadNotes() { this.notes = await (await fetch('/api/notes')).json(); },
            async saveNote() {
                await fetch('/api/notes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.newNote) });
                this.newNote = { title: '', content: '', visibility: 'public', priority: 'normal' };
                await this.loadNotes();
            },
            async moveKanban(id, newStatus) {
                await fetch(`/api/notes/${id}/status`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({status: newStatus}) });
                await this.loadNotes();
            },
            async deleteNotePermanently(id) {
                if(confirm("Eintrag permanent löschen?")) {
                    await fetch(`/api/notes/${id}`, { method: 'DELETE' });
                    await this.loadNotes();
                }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
