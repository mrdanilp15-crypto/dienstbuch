<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeuerwehrHub - Mängelboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=2.30">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
<div id="app" v-cloak>
    <nav class="navbar-top">
        <div class="navbar-brand-row">
            <div class="brand-left"><div class="brand-logo"><i class="fa fa-wrench"></i></div><div class="brand-title">Mängel- & Gerätepinnwand</div></div>
            <div class="brand-right"><a href="/dashboard" class="btn btn-sm btn-outline-light rounded-pill px-4 fw-bold">Dashboard</a></div>
        </div>
    </nav>

    <div class="main-content">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-secondary bg-dark" style="position: sticky; top: 20px;">
                    <h5 class="fw-bold text-white mb-3"><i class="fa fa-edit text-danger me-2"></i>Meldung eintragen</h5>
                    <form @submit.prevent="saveNote">
                        <div class="mb-3">
                            <label class="small fw-bold text-muted mb-1">Gerät / Fahrzeug / Betreff</label>
                            <input type="text" v-model="newNote.title" class="form-control rounded-3" placeholder="z.B. Kupplungsschaden LF 10" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold text-muted mb-1">Mängelbeschreibung</label>
                            <textarea v-model="newNote.content" class="form-control rounded-3" rows="5" placeholder="Genaue Beschreibung..." required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold text-muted mb-2 d-block">Sichtbarkeit & Zuweisung</label>
                            <select v-model="newNote.visibility" class="form-select rounded-3">
                                <option value="private">Privat (Nur für mich)</option>
                                <option value="public">Öffentlich (Für alle am Whiteboard)</option>
                                <option value="geratewart">Meldung an Gerätewart (Technischer Defekt)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 rounded-pill fw-bold py-2.5 text-uppercase shadow-sm">Meldung absetzen</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="d-flex flex-wrap gap-2 mb-3">
                    <button class="filter-pill shadow-sm" :class="{active: activeFilter === 'all'}" @click="activeFilter = 'all'">Alle anzeigen</button>
                    <button class="filter-pill shadow-sm" :class="{active: activeFilter === 'geratewart'}" @click="activeFilter = 'geratewart'"><i class="fa fa-wrench me-1"></i>Gerätewart-Mängel</button>
                    <button class="filter-pill shadow-sm" :class="{active: activeFilter === 'public'}" @click="activeFilter = 'public'"><i class="fa fa-users me-1"></i>Öffentlich</button>
                </div>

                <div class="row g-3">
                    <div class="col-12" v-for="n in filteredNotes" :key="n.id">
                        <div class="card p-4 border-secondary position-relative">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <div>
                                    <span :class="['badge-vis me-2', 'vis-' + n.visibility]">{{ getVisLabel(n.visibility) }}</span>
                                    <small class="text-muted font-monospace">{{ n.date_formatted }} Uhr — von {{ n.username }}</small>
                                </div>
                                <div class="d-flex gap-1">
                                    <button v-if="n.username === currentUser.username" class="btn btn-sm text-white p-1" @click="startEdit(n)"><i class="fa fa-edit text-primary"></i></button>
                                    <button class="btn btn-sm text-white p-1" @click="deleteNote(n.id)"><i class="fa fa-trash-alt text-danger"></i></button>
                                </div>
                            </div>
                            <h4 class="fw-bold text-white mb-2">{{ n.title }}</h4>
                            <p class="text-white-50 m-0" style="white-space: pre-wrap;">{{ n.content }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() { return { currentUser: { username: '', role: '' }, notes: [], activeFilter: 'all', editingId: null, newNote: { title: '', content: '', visibility: 'public' } } },
        computed: { filteredNotes() { if (this.activeFilter === 'all') return this.notes; return this.notes.filter(n => n.visibility === this.activeFilter); } },
        async mounted() {
            try { this.currentUser = await (await fetch('/api/auth/me', { credentials: 'include' })).json(); } catch (e) { window.location.href = '/'; return; }
            await this.loadNotes();
        },
        methods: {
            async loadNotes() { this.notes = await (await fetch('/api/notes', { credentials: 'include' })).json(); },
            async saveNote() {
                const isEdit = this.editingId !== null;
                const r = await fetch(isEdit ? `/api/notes/${this.editingId}` : '/api/notes', { method: isEdit ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(this.newNote) });
                if (r.ok) { this.newNote = { title: '', content: '', visibility: 'public' }; this.editingId = null; await this.loadNotes(); }
            },
            startEdit(note) { this.editingId = note.id; this.newNote = { title: note.title, content: note.content, visibility: note.visibility }; window.scrollTo({ top: 0, behavior: 'smooth' }); },
            cancelEdit() { this.editingId = null; this.newNote = { title: '', content: '', visibility: 'public' }; },
            async deleteNote(id) { if (confirm("Meldung permanent aus dem System löschen?")) { await fetch(`/api/notes/${id}`, { method: 'DELETE', credentials: 'include' }); await this.loadNotes(); } },
            getVisLabel(v) { return v === 'public' ? 'Öffentlich' : v === 'private' ? 'Privat' : v === 'admin' ? 'Admin' : '⚠️ Gerätewart-Mangel'; }
        }
    }).mount('#app');
</script>
</body>
</html>
