<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeuerwehrHub - Pinnwand & Funkraum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div id="app" v-cloak>
    <header class="page-header shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h2 class="fw-black m-0 text-white tracking-tight"><i class="fa fa-sticky-note me-3 text-warning"></i>Notizen & Mängelmeldungen</h2>
            <a href="/dashboard" class="btn btn-light btn-sm rounded-pill px-4 fw-bold">Dashboard</a>
        </div>
    </header>

    <div class="container">
        <div class="row g-4">
            <!-- Eingabemaske links -->
            <div class="col-lg-4">
                <div class="card p-4 sticky-top border-0 shadow-sm" style="top: 20px; z-index: 10;">
                    <h5 class="fw-bold mb-3 text-dark">
                        <i class="fa fa-pen-to-square me-2 text-muted"></i>{{ editingId ? 'Eintrag korrigieren' : 'Meldung erfassen' }}
                    </h5>
                    
                    <form @submit.prevent="saveNote">
                        <div class="mb-3">
                            <label class="small fw-bold text-muted mb-1">Betreff / Titel</label>
                            <input type="text" v-model="newNote.title" class="form-control border-0 bg-light rounded-3 shadow-sm" placeholder="z.B. Defekt an HLF Geräteraum 3" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="small fw-bold text-muted mb-1">Inhalt / Schadensbeschreibung</label>
                            <textarea v-model="newNote.content" class="form-control border-0 bg-light rounded-3 shadow-sm" rows="5" placeholder="..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="small fw-bold text-muted mb-2 d-block">Sichtbarkeits-Kategorie</label>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" id="r-private" value="private" v-model="newNote.visibility">
                                <label class="form-check-label small fw-bold text-secondary" for="r-private"><i class="fa fa-lock me-2 text-primary"></i>Privat</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" id="r-public" value="public" v-model="newNote.visibility">
                                <label class="form-check-label small fw-bold text-secondary" for="r-public"><i class="fa fa-users me-2 text-success"></i>Öffentlich (Whiteboard)</label>
                            </div>
                            <div class="form-check mb-2" v-if="currentUser.role === 'admin'">
                                <input class="form-check-input" type="radio" id="r-admin" value="admin" v-model="newNote.visibility">
                                <label class="form-check-label small fw-bold text-danger" for="r-admin"><i class="fa fa-user-shield me-2"></i>Admin-Intern</label>
                            </div>
                            <div class="form-check mb-0">
                                <input class="form-check-input" type="radio" id="r-gw" value="geratewart" v-model="newNote.visibility">
                                <label class="form-check-label small fw-bold text-warning" for="r-gw"><i class="fa fa-wrench me-2"></i>Meldung an Gerätewart</label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button v-if="editingId" type="button" class="btn btn-secondary rounded-3 fw-bold flex-fill" @click="cancelEdit">Abbrechen</button>
                            <button type="submit" class="btn btn-danger rounded-3 fw-bold py-2 flex-fill shadow-sm">Sichern</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Pinnwand rechts -->
            <div class="col-lg-8">
                <div class="d-flex flex-wrap gap-2 mb-4">
                    <button class="filter-pill shadow-sm" :class="{active: activeFilter === 'all'}" @click="activeFilter = 'all'">Alle</button>
                    <button class="filter-pill shadow-sm" :class="{active: activeFilter === 'private'}" @click="activeFilter = 'private'"><i class="fa fa-lock me-1"></i>Privat</button>
                    <button class="filter-pill shadow-sm" :class="{active: activeFilter === 'public'}" @click="activeFilter = 'public'"><i class="fa fa-users me-1"></i>Pinnwand</button>
                    <button class="filter-pill shadow-sm" :class="{active: activeFilter === 'geratewart'}" @click="activeFilter = 'geratewart'"><i class="fa fa-wrench me-1"></i>Gerätewart</button>
                </div>

                <div class="row g-3">
                    <div class="col-12" v-for="n in filteredNotes" :key="n.id">
                        <div class="note-card card p-4">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div>
                                    <span :class="['badge-vis me-2', 'vis-' + n.visibility]">{{ getVisLabel(n.visibility) }}</span>
                                    <small class="text-muted font-monospace">{{ n.date_formatted }} — von <b>{{ n.username }}</b></small>
                                </div>
                                <div class="d-flex gap-1">
                                    <button v-if="n.username === currentUser.username" class="btn btn-sm text-muted p-0 border-0 me-2" @click="startEdit(n)"><i class="fa fa-edit text-primary"></i></button>
                                    <button class="btn btn-sm text-muted p-0 border-0" @click="deleteNote(n.id)"><i class="fa fa-trash-alt text-danger"></i></button>
                                </div>
                            </div>
                            <h5 class="fw-bold text-dark mb-2 mt-1">{{ n.title }}</h5>
                            <p class="text-secondary m-0" style="white-space: pre-wrap; font-size: 0.9rem;">{{ n.content }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() { return { currentUser: { username: '', role: '' }, notes: [], activeFilter: 'all', editingId: null, newNote: { title: '', content: '', visibility: 'private' } } },
        computed: { filteredNotes() { if (this.activeFilter === 'all') return this.notes; return this.notes.filter(n => n.visibility === this.activeFilter); } },
        async mounted() {
            try { this.currentUser = await (await fetch('/api/auth/me', { credentials: 'include' })).json(); } catch (e) { window.location.href = '/'; return; }
            await this.loadNotes();
        },
        methods: {
            async loadNotes() { this.notes = await (await fetch('/api/notes', { credentials: 'include' })).json(); },
            async saveNote() {
                const isEdit = this.editingId !== null;
                const r = await fetch(isEdit ? `/api/notes/${this.editingId}` : '/api/notes', {
                    method: isEdit ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(this.newNote)
                });
                if (r.ok) { this.newNote = { title: '', content: '', visibility: 'private' }; this.editingId = null; await this.loadNotes(); }
            },
            startEdit(note) { this.editingId = note.id; this.newNote = { title: note.title, content: note.content, visibility: note.visibility }; window.scrollTo({ top: 0, behavior: 'smooth' }); },
            cancelEdit() { this.editingId = null; this.newNote = { title: '', content: '', visibility: 'private' }; },
            async deleteNote(id) { if (confirm("Eintrag unwiderruflich löschen?")) { await fetch(`/api/notes/${id}`, { method: 'DELETE', credentials: 'include' }); await this.loadNotes(); } },
            getVisLabel(v) { return v === 'public' ? 'Öffentlich' : v === 'private' ? 'Privat' : v === 'admin' ? 'Admin' : '⚠️ Gerätewart'; }
        }
    }).mount('#app');
</script>
</body>
</html>
