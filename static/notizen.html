<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeuerwehrHub - Whiteboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=2.30">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
<div id="app" v-cloak>
    <header class="page-header shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h2 class="fw-black m-0 text-white tracking-tight"><i class="fa fa-sticky-note me-3 text-warning"></i>Notizen & Mängelmeldungen</h2>
            <a href="/dashboard" class="btn btn-light btn-sm rounded-pill px-4 fw-bold shadow-sm">Dashboard</a>
        </div>
    </header>

    <div class="container-fluid px-4">
        <div class="row g-4">
            <!-- Formular links -->
            <div class="col-lg-4">
                <div class="card border-0 p-4 shadow-sm bg-white" style="position: sticky; top: 20px;">
                    <h5 class="fw-bold text-dark mb-3"><i class="fa fa-pen-to-square me-2 text-muted"></i>Eintrag verfassen</h5>
                    <form @submit.prevent="saveNote">
                        <div class="mb-3">
                            <label class="small fw-bold text-muted mb-1">Betreff / Titel</label>
                            <input type="text" v-model="newNote.title" class="form-control border-0 bg-light rounded-3 py-2.5" placeholder="z.B. Defekt an HLF Geräteraum 3" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold text-muted mb-1">Inhalt / Beschreibung</label>
                            <textarea v-model="newNote.content" class="form-control border-0 bg-light rounded-3 py-2" rows="4" placeholder="..." required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold text-muted mb-2 d-block">Sichtbarkeits-Kategorie</label>
                            <select v-model="newNote.visibility" class="form-select border-0 bg-light rounded-3 py-2">
                                <option value="private">Privat (Nur für mich)</option>
                                <option value="public">Öffentlich (Whiteboard)</option>
                                <option value="geratewart">Meldung an Gerätewart</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 rounded-pill fw-bold py-2.5 shadow-sm text-uppercase">Meldung veröffentlichen</button>
                    </form>
                </div>
            </div>

            <!-- Pinnwand rechts -->
            <div class="col-lg-8">
                <div class="row g-3">
                    <div class="col-12" v-for="n in notes" :key="n.id">
                        <div class="note-card card p-4 border-0 shadow-sm bg-white position-relative">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span :class="['badge-vis', n.visibility === 'geratewart' ? 'vis-geratewart' : 'vis-public']">{{ n.visibility }}</span>
                                <small class="text-muted font-monospace">Eingetragen von <b>{{ n.username }}</b></small>
                            </div>
                            <h5 class="fw-bold text-dark mb-2">{{ n.title }}</h5>
                            <p class="text-secondary m-0 lh-base" style="white-space: pre-wrap; font-size: 0.95rem;">{{ n.content }}</p>
                            <button class="btn btn-xs text-danger position-absolute bottom-0 end-0 m-3 border-0" @click="deleteNote(n.id)"><i class="fa fa-trash-alt"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() { return { notes: [], newNote: { title: '', content: '', visibility: 'public' } } },
        async mounted() { await this.loadNotes(); },
        methods: {
            async loadNotes() { this.notes = await (await fetch('/api/notes')).json(); },
            async saveNote() {
                await fetch('/api/notes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.newNote) });
                this.newNote = { title: '', content: '', visibility: 'public' };
                await this.loadNotes();
            },
            async deleteNote(id) { if(confirm("Eintrag entfernen?")) { await fetch(`/api/notes/${id}`, { method: 'DELETE' }); await this.loadNotes(); } }
        }
    }).mount('#app');
</script>
</body>
</html>
